body:
  text: 列子卷八晉張湛注唐殷敬慎釋文說符第八夫事故無方倚伏相推言而驗之者攝乎變通之㑹子列子學於壺丘子林壺丘子林曰子知持後則可言持身矣老子曰後其身而身先列子曰願聞持後曰顧若影則知之列子顧而觀影形枉則影曲形直則影正然則枉直隨形而不在影屈申任物而不在我此之謂持後而處先物莫能與争故常處先此語以壺子答而不條顯列子一得持後之義因而自釋之壺子即以為解故不復答列子也關尹謂子列子曰言美則響美言惡則響惡身長則影長身短則影短名也者響也身也者影也夫美惡報應譬之影響理無差焉故曰慎爾言將有和之慎爾行下孟反將有隨之所謂出其言善千里應之行乎邇見乎遠是故聖人見岀以知入觀往以知來此其所以先知之理也見言出則響入形往則影來報應之理不異於此也而物所未悟故曰先知之耳度在身稽在人人愛我我必愛之人惡我我必惡之禮度在身考驗由人愛惡從之物不負已湯武愛天下故王于况反桀紂惡天下故亡此則成驗此所稽也稽度皆明而不道也譬之岀不由門行不從徑也稽度之理旣明而復道不行者則岀可不由戸行不從徑也以是求利不亦難乎違理而得利未之有嘗觀之神農有炎之徳稽之虞夏商周之書度徒洛反量也諸法士賢人之言所以存亡廢興而非由此道者未之有也自古迄今無不符驗嚴恢曰所爲問道者爲于僞反富問猶學也今得珠亦富矣安用道道富之夲也珠富之末有夲故末存存末則失夲也子列子曰桀紂唯重利而輕道是以亡非不富失夲則亡身幸哉余未汝語也人而無義唯食而已義者宜也得理之宜者物不能奪也是雞狗也彊食靡角韓詩外傳云靡共也吕氏春秋云角試力也此言人重利而輕道唯食而已亦猶禽獸飽食而相共角力以求勝也勝者爲制是禽獸也以力求勝非人道也爲雞狗禽獸矣而欲人之尊己不可得也豈欲人之尊己道在則自尊耳人不尊己則危辱及之矣樂推而不厭尊己之謂茍違斯義亡將至列子學射中矣丁仲反下同率爾自中非能期中者也請於關尹子尹子曰子知子之所以中者乎對曰弗知也關尹子曰未可雖中而未知所以中故曰未可也退而習之三年又以報關尹子尹子曰子知子之所以中乎列子曰知之矣關尹子曰可矣守而勿失也心平體正内求諸己得所以中之道則前期命矣發無遺矣非獨射也爲國與身亦皆如之故聖人不察存亡而察其所以然射雖中而不知所以中則非中之道身雖存不知所以存則非存之理故夫射者能拙俱中而知所以中者異賢愚俱存而知所以存者殊也列子曰色盛者驕力盛者奮未可以語道也色力是常人所矜也故不斑白語道失而況行之乎色力旣衰方欲言道悟之已晚言之猶未能得而況行之乎故自奮則人莫之告人莫之告則孤而無輔矣驕奮者雖告而不受則有忌物之心耳目自塞誰其相之賢者任人故年老而不衰智盡而不亂不專己知則物願爲己用矣故治國之難在於知賢而不在自賢自賢者即上所謂孤而無輔知賢則智者爲之謀能者爲之使物無棄才則國易治也宋人有爲于僞反其君以玉爲楮葉者三年而成鋒殺所拜反莖柯毫芒音亡繁澤亂之楮葉中而不可别也别彼列反此人遂以巧食宋國子列子聞之曰使天地之生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧此明用巧能不足以贍物因道而化則無不周子列子窮容貌有飢色客有言之鄭子陽者曰列禦冦盖有道之士也居君之國而窮君無乃爲不好呼報反士乎鄭子陽即令官遺之粟子列子岀見使者再拜而辭使者去子列子入其妻望之而拊心曰妾聞爲有道者之妻子皆得佚樂今有飢色君遇一夲作過或作適而遺先生食先生不受豈不命也哉子列子謂之曰君非自知我也以人之言而遺我粟至其罪我也又且以人之言此吾所以不受也其卒民果作難一作亂而殺子陽魯施氏有二子其一好學其一好兵好學者以術干齊侯齊侯納之爲諸公子之傅好兵者之楚以法干楚王王恱之以爲軍正禄富其家爵榮其親施氏之鄰人孟氏同有二子所業亦同而窘於貧羡施氏之有有猶富也因從請進趨之方二子以實告孟氏孟氏之一子之秦以術干秦王秦王曰當今諸侯力争所務兵食而已若用仁義治吾國是㓕亡之道遂宫而放之其一子之衛以法干衛侯衛侯曰吾弱國也而攝乎大國之間大國吾事之小國吾撫之是求安之道若頼兵權滅亡可待矣若全而歸之適於他國爲吾之患不輕矣遂刖之而還諸魯旣反孟氏之父子叩胷而讓施氏施氏曰凡得時者昌失時者亡子道與吾同而功與吾異失時者也非行之謬也且天下理無常是事無常非應機則是失㑹則非先日所用今或棄之今之所棄後或用之此用與不用無定是非也投隙抵時應事無方屬音燭乎智雖有仁義禮法之術而智不適時則動而失㑹者矣智茍不足一夲無不字使君博如孔邱術如吕尚焉徃而不窮哉二子之所以窮不以其博與術以其不得隨時之宜孟氏父子音捨然無愠容曰吾知之矣子勿重言晉文公岀㑹欲伐衛公子鋤仰天而公問何曰臣鄰之人有送其妻適私家者道見桑婦恱而與言然顧視其妻亦有招之者矣臣竊此也公寤其言乃止引師而還未至而有伐其北鄙者矣夫我之所行人亦行之而欲騁己之志謂物不生心惑於彼此之情也晉國苦盗有郄雍者能視盗之貌察其眉睫之間而得其情晉侯使視盗千百無遺一焉晉侯大喜告趙文子曰吾得一人而一國盗爲盡矣奚用多爲文子曰吾君恃伺察而得盗盗不盡矣且郄雍必不得其死焉俄而羣盗謀曰吾所窮者郄雍也遂共盗而殘之殘賊殺之晉侯聞而大駭立召文子而告之曰果如子言郄雍死矣然取盗何方文子曰周諺有言察見淵魚者不祥智料隱匿者有殃此荅所以致死且君欲無盗莫若舉賢而任之使敎明於上化行於下民有恥心則何盗之爲此荅所以止盗之方於是用隨㑹知政而羣盗奔秦焉用聦明以察是非者羣詐之所逃用先識以擿奸伏者衆惡之所疾智之爲患豈虚言哉孔子自衛反魯息駕乎河梁而觀焉有懸水三十仞圜與圎同流九十里魚鼈弗能游黿鼉弗能居有一丈夫方將厲之渉水也孔子使人並蒲浪反涯音崖止之曰此懸水三十仞圜流九十里魚鼈弗能游黿鼉弗能居也意者難可以濟乎丈夫不以錯七故反意遂度而岀孔子問之曰巧乎有道術乎所以能入而岀者何也丈夫對曰始吾之入也先以忠信及吾之岀也又從以忠信忠信錯吾軀於波流而吾不敢用私所以能入而復岀者以此也孔子謂弟子曰二三子識音志之水且猶可以忠信誠身親之而況人乎黃帝篇中已有此章而小不同所明亦無以異故不復釋其義也白公問孔子曰人可與微言乎孔子不應白公楚平王之孫太子建之子也其父爲費無極所譛岀奔鄭鄭人殺之勝欲令尹子西司馬子期伐鄭許而未行晉伐鄭子西子期將救鄭勝怒曰鄭人在此讐不逺矣欲殺子西子期故問孔子孔子知之故不應微言猶密謀也白公問曰若以石投水何如孔子曰吳之善没者能取之石之投水則没喻其微言不可覺故孔子荅以善没者能得之明物不可隱者也曰若以水投水何如孔子曰淄澠音乗之合易牙嘗而知之復爲善味者所别也白公曰人故不可與微言乎孔子曰何爲不可唯知言之謂者乎謂者所以發言之㫖趣發言之㫖趣則是言之微者形之於事則無所隱夫知言之謂者不以言言也言言則無微隱争魚者濡逐獸者趨非樂之也自然之勢自應濡走故至言去言理自明化自行至爲無爲理自成物自從夫淺知音智之所爭者末矣失夲存末事著而後爭解鮮不及也白公不得已遂死於浴室不知言之所謂遂便作亂故及於難趙襄子使新稺穆子攻翟音狄穆子襄子家臣新稺狗也翟鮮虞也勝之取左人中人左人中人鮮虞二邑名使遽人謁之遽傅也謁告也襄子方食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰夫江河之大也不過三日謂潮水有大小飄風暴雨不終朝日中不須㬰勢盛者必退也今趙氏之德行無所施於積無積德而有重功不可不戒懼也一朝而兩城下亡其及我哉不忘亡則不亡之也孔子聞之曰趙氏其昌乎夫憂者所以爲昌也戒之深也喜者所以爲亡也將致矜伐勝非其難者也持之其難者也賢主以此持勝故其福及後世齊楚吳越皆嘗勝矣然卒取亡焉不逹乎持勝也唯有道之主爲能持勝勝敵者皆比國而有以不能持勝故危亡及之孔子之勁能拓一夲作招淮南子作杓許愼云杓引也古者縣門下從上杓引之皆難也國門之關而不肯以力聞勁力也拓舉也孔力能舉門關而力名不聞者不用其力也墨子爲守攻公輸般音班服而不肯以兵知公輸般善爲攻噐墨子設守能却之爲般所服而不稱知兵者不有其態也故善持勝者以強爲弱得爲攻之母也宋人有好行仁義者三世不懈古賣反家無故黒牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而盲其牛又復生白犢其父又復令其子問孔子其子曰前問之而失明又何問乎父曰聖人之言先迕後合其事未䆒姑復問之其子又復問孔子孔子曰吉祥也復敎以祭其子歸致命其父曰行孔子之言也居一年其子又無故而盲其後楚攻宋圍其城民易子而食之析音錫骸而炊之丁壯者皆乗城而戰死者大半此人以父子有疾皆免及圍解而疾俱復此所謂禍福相倚也宋有蘭子者史記云無淳博岀入爲䦨應劭曰蘭妄也此所謂蘭子者以技妄遊者也疑蘭與闌同凡人物不知生岀者謂之蘭也以技干宋元宋元召而使見其技以技長倍其身屬屬音燭其踁音脛並趨並馳弄七劒迭而躍之五劒常在空中元君大驚立賜金帛又有蘭子又能燕戲者如今之絶倒投俠者聞之復以干元君元君大怒曰昔有異技干寡人者謂先僑人技無庸適值寡人有歡心故賜金帛彼必聞此而進復望吾賞拘而擬戮之經月乃放此技同而時異則功賞不可預要也秦穆公謂伯樂曰子之年長張丈反矣伯樂善相馬者子姓有可使求馬者乎問伯樂之種姓有能相馬繼樂者不伯樂對曰良馬可形容筋骨相也馬之良者可以形骨取也天下之馬者若滅若没若亡若失天下之絶倫者不於形骨毛色中求故髣髴恍愡若存若亡難得知也若此者絶塵弭亡爾反跡也一夲作撤言迅之極臣之子皆下才也可告以良馬不可告以天下之馬也臣有所與共同也一夲作供擔纒薪菜者負索薪菜蓋賤役者有九方臯此一夲作比其於馬非臣之下也請見之非臣之下言有過於己穆公見之使行求馬三月而反報曰已得之矣在沙邱地名穆公曰何馬也對曰牝而黃使人往取之牡而驪力移反穆公不說召伯樂而謂之曰敗矣子所使求馬者謂九方臯色物牝牡尚弗能知又何馬之能知也伯樂喟然太息曰一至於此乎是乃其所以千萬臣而無數者也言其相馬之妙乃如此也是以勝臣千萬而不可量若臯之所觀天機也天機形骨之表所以使蹄足者得之於心不顯其見得其精而忘其麤與麄同在其內而忘其外精內謂天機麤外謂牝牡毛色見其所見所見者唯天機也不見其所不見所不見毛色牝牡也視其所視視所宜視者不忘其所視而遺其所不視所不應視者不以經意也若臯之相馬乃有貴乎馬者也言臯之此術豈止於相馬而已神明所得必有貴於相馬者言其妙也馬至果天下之馬也楚莊王問何曰治國柰何何蓋隱者也何對曰臣明於治身而不明於治國也楚莊王曰寡人得奉宗廟社稷願學所以守之何對曰臣未嘗聞身治而國亂者也又未嘗聞身亂而國治者也故本在身不敢對以末楚王曰善狐邱丈人謂孫叔敖五勞反楚大夫也曰人有三怨子知之乎狐邱邑名丈人長老者孫叔敖曰何謂也對曰爵高者人妬之官大者主惡之惡烏路反祿厚者怨逮之孫叔敖曰吾爵益高吾志益下吾官益大吾心益小吾祿益厚吾施益博以是免於三怨可乎孫叔敖疾將死戒其子曰王亟紀力反急也封我矣吾不受也爲我死王則封汝汝必無受利地楚越之間有寢邱者此地不利而名甚惡楚人鬼而越人禨音機祥也又音畿信鬼神與禨祥可長有者唯此也孫叔敖死王果以美地封其子子辭而不受請寢邱在固始史記云孫叔敖善優孟後優孟言於莊王王召其子封之寢邱與之至今不失漢蕭何亦云子孫無令勢家所奪即此𩔖也牛缺者上地之大儒也下之邯鄲遇盜於耦沙之中盡取其衣裝車牛歩而去視之歡然無憂之色盜追而問其故曰君子不以所養害其所養盜曰嘻賢矣夫旣而相謂曰以彼之賢徃見趙君使以我爲必困我不如殺之乃相與追而殺之燕人聞之聚族相戒曰遇盜莫如上地之牛缺也皆受敎俄而其弟適秦至關下果遇盜憶其兄之戒因與盜力争旣而不如又追而以卑辭請物盜怒曰吾活汝𢎞矣而追吾不已迹將著焉旣爲盜矣仁將焉在遂殺之又傍害其黨四五人焉牛缺以無招患燕人假有惜受禍安危之不可預圖皆此𩔖虞氏者梁之富人也家充殷盛錢帛無量財貨無訾音髭言不可度量也賈逵注國語云訾量也登高樓臨大路設樂陳酒擊博樓上擊打也如今陸碁也韋昭博奕論云設木而擊之是也古博經曰博法二人相對坐向局局分爲十二道兩頭當中名爲水用碁十二故法六白六黒又用魚二枚置於水中其擲采以瓊爲之瓊畟方寸三分長寸五分銳其頭鑚刻瓊四靣爲眼亦名爲齒二人互擲采行碁碁行到處即竪之名爲驍碁即入水食魚亦名牽魚毎牽一魚獲二籌翻一魚獲三籌若已牽兩魚而不勝者名曰翻魚彼家獲六籌爲大勝也畟音測俠客相隨而行樓上博者射爲句食亦反明瓊張中丁仲反反音翻兩㩉他臘反魚而凡戲争能取中皆曰射亦曰投裵駰曰報采獲魚也㩉字案眞經本或作魚案大博經作鰈比目魚也此言報采獲中翻得兩魚大勝而也鰈他獵反今本云㩉魚者是多一字也㩀義用鰈不用魚用魚不用鰈字明瓊齒五白也射五白得之反兩魚獲勝故大飛鳶適音墜音隊其腐䑕而中之俠客相與言曰虞氏富樂之日久矣而常有輕易人之志吾不侵犯之而乃辱我以腐䑕此而不報無以立慬於天下慬勇請與若等戮力一志率徒屬必滅其家爲等倫皆許諾至期日之夜聚衆積兵以攻虞氏大滅其家驕奢之致禍敗不以一塗虞氏無心於陵物而家破者亦由謙退之行不素著故也東方有人焉曰爰旌目將有適也而餓於道狐父父音甫下同之盜曰邱見而下壺餐音孫水澆飯也以餔音晡之爰旌目三餔而後能視曰子何爲者也曰我狐父之人邱也爰旌目曰譆音熈汝非盗邪胡爲而食我音嗣吾義不食子之食也兩手據地而歐一口反之不岀喀喀音客然遂伏而死狐父之人則盗矣而食非盗也以人之盗因謂食爲盜而不敢食是失名實者也柱厲叔事莒敖公自爲不知己者居海上夏日則食菱芰一本作芡冬日則食橡音象栗莒敖公有難柱厲叔辭其友而徃死之其友曰子自以爲不知已故去今徃死之是知與不知無辨也柱厲叔曰不然自以爲不知故去今死是果不知我也吾將死之以醜後世之人主不知其臣者也凡知則死之不知則弗死此直道而行者也柱厲叔可謂懟以忘其身者也楊朱曰利岀者實及怨徃者害來利不獨徃怨不偏行自然之勢發於此而應於外者唯請請當作情情所感無逺近幽深是故賢者愼所岀善著則吉應惡積則禍臻楊子之鄰人亡羊旣率其黨又請楊子之豎追之楊子曰嘻亡一羊何追者之衆鄰人曰多岐路旣反問獲羊乎曰亡之矣曰奚亡之曰岐路之中又有岐焉吾不知所之所以反也楊子戚子六反然變容不言者移時不笑者竟日門人怪之請曰羊賤畜丑救反又非夫子之有而損言者何哉楊子不荅門人不獲所命弟子孟孫陽岀以吿心都子心都子他日與孟孫陽偕入而問曰昔有昆弟三人游齊魯之間同師而學進仁義之道而歸其父曰仁義之道若何伯曰仁義使我愛身而後名身體髪膚不敢毁傷也仲曰仁義使我殺身以成名無求生以害仁有殺身以成仁也叔曰仁義使我身名並全旣明且哲以保其身彼三術相反而同岀於儒孰是孰非邪楊子曰人有濵河而居者習於水勇於泅操舟鬻渡利供百口裹糧就學者成徒而溺死者幾音祈半本學泅不學溺而利害如此若以爲孰是孰非心都子嘿然而岀孟孫陽讓之曰何吾子問之迂夫子荅之僻吾惑愈甚心都子曰大道以多岐亡羊學者以多方䘮生學非本不同非本不一而末異若是唯歸同反一爲亡得䘮子長先生之門習先生之道而不逹先生之況也哀哉楊朱之弟曰布衣素衣衣素之衣去聲而岀天雨解素衣衣緇衣而反其狗不知迎而吠之楊布怒將扑之楊朱曰子無扑矣子亦猶是也嚮音向者使汝狗白而徃黒而來豈能無怪哉此篇明已身變異則外物所不逹故有是非之義不內求諸己而厚責於人亦猶楊布服異而怪狗之吠也楊朱曰行善不以爲名而名從之名不與利期而利歸之利不與争期而争及之故君子必愼爲善在智則人與之訟在力則人與之争此自然之勢也未有處名利之衝患難不至者也語有之曰爲善無近名豈不信哉昔人言有知不死之道者燕君使人受之不捷而言者死燕君甚怒其使者將加誅焉幸臣諫曰人所憂者莫急乎死已所重者莫過乎生彼自䘮其生安能令君不死也乃不誅有齊子亦欲學其道聞言者之死乃撫膺而恨富子聞而之曰夫所欲學不死其人已死而猶恨之是不知所以爲學胡子曰富子之言非也凡人有術不能行者有矣能行而無其術者亦有矣衛人有善數者臨死以訣喻其子其子志其言而不能行也他人問之以其父所言告之問者用其言而行其術與其父無差焉若然死者奚爲不能言生術哉物有能言而不能行能行而不能言才性之殊也邯鄲之民以正月之旦獻鳩於簡子簡子大恱厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君之欲放之競而捕之死者衆矣君如欲生之不若禁民勿捕捕而放之恩過不相𥙷矣簡子曰然齊田氏祖於庭食客千人中坐有獻魚鴈者田氏視之乃歎曰天之於民厚矣殖五榖生魚鳥以爲之用衆客和之如響鮑氏之子年十二預於次進曰不如君言天地萬物與我並生𩔖也𩔖無貴賤同生是𩔖但自貴而自賤徒以小大智力而相制迭相食非相爲而生之人取可食者而食之豈天本爲人生之且蚊蚋子臘反膚虎狼食肉非天本爲蚊蚋生人虎狼生肉者哉齊有貧者常乞於城市城市患其亟也亟去吏反數也衆莫之與遂適田氏之廏從焉醫作役而假食郭中人戲之曰從馬醫而食不以辱乎乞兒曰天下之辱莫過於乞乞猶不辱豈辱馬醫哉不以從馬醫爲恥辱也此章言物一處極地分旣以定則無復廉恥况自然能夷得失者乎宋人有游於道一本作宋有游於道得人遺契者遺棄歸而藏之密數其齒刻處似齒告鄰人曰吾富可待矣假空名以求實者亦如執遺契以求富也人有枯梧樹者其鄰父言枯梧之樹不祥其鄰人遽而伐之言之雖公而失厝言之所也鄰人父因請以爲薪又踐可疑之塗其人乃不恱曰鄰人之父徒欲爲薪而教吾伐之也在可疑之地物所不信也與我鄰若此其險豈可哉人有亡鈇者鈇鉞也意其鄰之子視其行歩竊鈇也顔色竊鈇也言語竊鈇也作動態度無爲而不竊鈇也俄而抇胡没反古掘字又其月反一本作相非也其谷而得其鈇他日復見其鄰人之子動作態度無似竊鈇者意所偏感則隨念想而轉易及其甚者則白黒等色方圎共形豈外物之變故語有之曰萬事紛錯皆從意生白公勝慮亂慮猶度也謀度作亂罷朝而立倒杖策錣一音張劣反許愼注淮南子云馬䇿端有利鋒所以刺不前也上貫頥錣杖末鋒血流至地而弗知也鄭人聞之曰頥之忘將何不忘哉意之所屬音燭著直畧反其行足躓音致礙也株埳埳音坎頭抵丁禮反植木而不自知也昔齊人有欲金者清旦衣冠並去聲而之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何對曰取金之時不見人徒見金嗜慾之亂人心如此之甚也故古人有言察秋毫之末者不見泰山之形調五音之和者不聞雷霆之聲夫意萬物所係迷著外物者雖形聲之大而有遺矣况心乗於理檢情攝念泊然凝定者豈萬物動之所能亂者乎列子卷八
