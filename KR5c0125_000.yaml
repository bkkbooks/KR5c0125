front:
  text: 欽定四庫全書子部十四
  hash: sha256:59b6c5006a29a1c169640e5600631b30d9a17b0b2b0283c6e596da3e89cb6da6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0125_WYG_000-1a, image: WYG1055/WYG1055-0573a.png}
body:
  text: 列子道家類提要臣等謹按列子八卷舊本題周列禦冦撰前有劉向校上奏以禦冦為鄭穆公時人唐桞宗元集有辨列子一篇曰穆公在孔子前幾百嵗列子書言鄭國皆言子産鄭析不知向何以言之如此史記鄭繻公子十四年楚悼王四年圍鄭殺其相駟子陽子陽正與列子同時是嵗魯穆公十年不知向言魯穆公時遂誤為鄭耶其後張湛徒知怪列子書言穆公後事每不能推知其時然其書亦多增竄非其實其言魏牟孔穿皆出列子後不可信云云其後髙似孫緯略遂疑列子為鴻濛雲將之流並無其人今考第五卷湯問篇中併有鄒衍吹律事不止魏牟孔穿其不出禦寇之手更無疑義然考爾雅疏引尸子廣澤篇曰墨子貴兼孔子貴公皇子貴衷田子貴均列子貴虛料子貴别囿其學之相非也數世矣而已皆弇于私也天帝皇后辟公宏廓宏博介純夏憮冡晊昄皆大也十有餘名而實一也若使兼公虛均衷平易别囿一實也則無相非也云云是當時實有列子非莊周子寓名又穆天子傅出于晉太康中為漢魏人之所未睹而此書第三卷周穆王篇所敘駕八駿造父為御至巨搜登崑崙見西王母於瑶池事一一與傳相合此非劉向之時所能偽造可信確為秦以前書考公羊傳隱公十一年子沈子曰何休注曰子沈子後師沈子稱子冠氏上著其為師也然則凡稱子某子者乃弟子之稱師非所自稱子列子則決為傳其學者所追記非禦冦自著其雜記列子後事正如莊子記莊子死管子稱吳王西施商子稱秦孝公耳不足為怪晉光祿勳張湛作是書注於天瑞篇首所稱子列子字知為追記師言而他篇復以載及後事為疑未免不充其類矣書凡八篇與漢志所載相合趙希辨讀書附志載政和中宜春彭瑜為積石軍倅聞髙麗國列子十卷得其第九篇曰元瑞于青唐卜者云云今所行本皆無此卷殆宋人知其妄而不傳歟其注自張湛以外又有唐當塗丞殷敬順釋文二卷此本亦散附各句下然音注頗為淆亂有灼然知為説者亦有不辨孰張孰者明人刋本往往如是不足訝也據湛自序其母為王弼從姊妹湛往來外家故亦善談名理注亦弼注老子之亞葉夢得避暑録話乃議其雖知列子近佛經而逐事為解反多迷失是以唐後五家之禪繩晉人失其旨矣乾隆四十三年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀張湛列子注原序湛聞之張湛字處度東晉光祿勳注此真經先父曰吾先君與劉正輿傅頴根皆王氏之甥也並少詩照反遊外家舅始周姓王張湛祖之舅始周從疾用反兄正宗輔嗣皆好呼教反集文籍先并卑政反得仲宣家書幾將萬卷傅氏亦世為學門三君總角競録竒書及長丁丈反遭永嘉之亂與頴根同避難乃旦反南行車重各稱尺證反力並有所載而冦虜彌盛前途尚逺張謂傅曰今將不能盡子忍反全所載且共料音聊簡世所希有者各各保録令無遺棄頴根於是唯賫音擠其祖玄父咸子集先君所録書中有列子八篇及至江南僅音覲少也有存者列子唯餘楊朱説符目録三卷比必利反亂正輿為揚州刺史先來過江復扶又反在其家得四卷尋從輔嗣女壻趙季子家得六卷參校有無始得全備其書大略明羣有以至虛為宗萬品以終滅為驗神惠以凝寂常全想念以著直略反物自喪息浪反生覺音教與化夢等情巨細不限一域窮達無假智力治身貴於肆任而鴆反順性則所之皆適水火可蹈忘懷則無幽不照此其旨也然所明往往與佛經相參大歸同於老莊屬音燭辭引類特與莊子相似莊子慎到韓非尸子淮南子玄示旨歸多稱其言遂注之云爾劉向列子目録原序天瑞第一黃帝第二周穆王第三仲尼第四一曰極智湯問第五力命第六楊朱第七一曰達生説符第八右新書定著八章護左都水使者光祿大夫臣向言所校中書列子五篇臣向謹與長社尉臣參校讎太常書三篇太史書四篇臣向書六篇臣參書二篇內外書凡二十篇以校除復扶又反重十二篇定著八篇中書多外書少章亂布在諸篇中或字誤以盡津上聲誤也下同為進以賢為形如此者衆及在新書有棧音剪校讎從中書巳定皆以殺青謂汗簡刮去青皮也書可繕寫列子者鄭人也與鄭繆音穆公同時蓋有道者也其學本於黃帝老子號曰道家道家者秉要執本清虛無為及其治身接物務崇不競合於六經而穆王湯問二篇迂誕恢詭非君子之言也至於力命篇一推分符問反命楊子之篇唯貴放逸二義乖背音佩不似一家之書然各有所明亦有可觀者孝景皇帝時貴黃老術此書頗行於世及後遺落散在民間未有傳者且多寓言與莊周相類故太史公司馬遷不為列傳謹第録臣向昧死上時掌反護左都水使者光祿大夫臣向所校列子書録永始三年八月壬寅上
