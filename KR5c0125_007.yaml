body:
  text: 列子卷七晉張湛注唐殷敬慎釋文楊朱第七夫生者一氣之蹔聚一物之蹔靈蹔聚者終散蹔靈者歸虚而好逸惡勞物之常性故當生之所樂者厚味美服好色音聲而已耳而復不能肆性情之所安耳目之所娛以仁義為闗鍵用禮教為衿帶自枯槁於當年求餘名於後世者是不逹乎生生之極也楊朱或云字子居戰國時人後於墨子楊朱與禽滑辨論其説在愛己不拔一毛以利天下與墨子相反游於魯舎於孟氏孟氏問曰人而已矣奚以名為曰以名者為富既富矣奚不已焉曰為貴既貴矣奚不已焉曰為死既死矣奚為焉曰為子孫夫事為無己故情無厭足名奚益於子孫曰名乃苦其身燋其心夫名者因偽以求真假虚以招實矯性而行之有為而為之者豈得無勤憂之弊乘其名者澤及宗族利兼鄉黨況子孫乎凡為名者必廉廉斯貧為名者必讓讓斯賤此難家之辭也今有廉讓之名而不免貧賤者此為善而不求利也曰管仲之相齊也君淫亦淫君奢亦奢言不重美惡於己志合言從道行國霸死之後管氏而已田氏之相齊也君盈則己降君歛收聚也則已施始反此推惡於君也民皆歸之因有齊國子孫享之至今不絶若實名貧偽名富為善不以為名名自生者實名也為名以招利而世莫知者偽名也為名則得利者也曰實無名名無實名者偽而已矣不偽則不足以招利昔者堯舜偽以天下讓許由善卷而不失天下享祚百年偽實之迹因事而生致偽者由堯舜之迹而聖人無偽也伯夷叔齊實以孤竹君讓而終亡其國餓死於首陽之山實偽之辯如此其省也省猶察也楊朱曰百年夀之大齊去聲限也得百年者千無一焉設有一者孩抱以逮昬老㡬居其半矣夜眠之所弭晝覺音教之所遺又幾居其半矣痛疾哀苦亡失憂懼又幾居其半矣量十數年之中逌然而自得亡亡音無介焉之慮者亦亡一時之中爾則人之生也奚為哉奚樂哉為美厚爾為聲色爾而美厚復不可常猒一本猒作饜音同足聲色不可常翫聞乃復為刑賞之所禁勸名法之所進退遑遑爾競一時之虚譽規死後之餘榮偊偊爾慎一本作順耳耳目之觀聽惜身意之是非徒失當年之至樂不能自肆於一時重囚纍梏手械也何以异哉异異也古字太古之人知生之暫來知死之暫徃生實暫來死實長徃是世俗長談而云死復暫徃卒然覽之有似字誤然此書大㫖自以爲存亡徃復形氣轉續生死變化未始絶滅也注天瑞篇中已具詳其義矣故從心而動不違自然所好當身之娛非所去也故不爲名所勸一夲作觀爲善不近名者從性而游不逆萬物所好死後之名非所取也故不爲形所及爲惡不近刑者名譽先後年命多少非所量也楊朱曰萬物所異者生也所同者死也生則有賢愚貴賤是所異也死則有臭腐消滅是所同也雖然賢愚貴賤非所能也臭腐消滅亦非所能也故生非所生死非所死賢非所賢愚非所愚貴非所貴賤非所賤皆自然爾非能之所爲也然而萬物齊生齊死齊賢齊愚齊貴齊賤皆同歸於自然十年亦死百年亦死仁聖亦死凶愚亦死生則堯舜死則腐骨生則桀紂死則腐骨腐骨一矣孰知其異且趣當生奚遑死後此譏計後者之惑也夫不謀其前不慮其後無戀當今者徳之至也楊朱曰伯夷非亡音無欲矜清之郵音尤以放餓死守餓至死展季非亡情矜貞之郵以放寡宗少宗系也清貞之誤善之若此此誣賢負實之言然欲有所抑揚不得不寄責於高勝者耳楊朱曰原憲窶於魯子貢殖於衛窶貧也殖貨殖原憲之窶損生子貢之殖累身然則窶亦不可殖亦不可其可焉在曰可在樂生可在逸身故善樂生者不窶足已之所資不至乏匱也善逸身者不殖不勞心以營貨財也楊朱曰古語有之生相憐死相捐此語至矣相憐之道非唯情也勤能使逸飢能使飽寒能使溫窮能使逹也相捐之道非不相哀也不含音撼珠玉不服文錦不陳犧牲不設明器也晏平仲問養生於管夷吾管夷吾曰肆之而已勿壅勿閼晏平仲曰其目柰何夷吾曰恣耳之所欲聽恣目之所欲視恣鼻之所欲向恣口之所欲言恣體之所欲安恣意之所欲行管仲功名人耳相齊致霸動因威謀任運之道旣非所宜且於事勢不容此言又上篇復能勸桓公適終北之國恐此皆寓言也夫耳之所欲聞者音聲而不得聽謂之閼閼塞聦目之所欲見者美色而不得視謂之閼明鼻之所欲向者椒蘭而不得嗅謂之閼顫與羶字同須延反鼻通曰顫顫音舒延反口之所欲道者是非而不得言謂之閼智體之所欲安者美厚而不得從謂之閼適意之所欲爲者放逸而不得行謂之閼徃凡此諸閼廢虐之主廢大也去廢虐之主熈熈縱情欲也然以俟死一日一月一年十年吾所謂養任情極性窮歡盡娛雖近期促年且得盡當生之樂也拘此廢虐之主録而不戚戚然以至久生百年千年萬年非吾所謂養惜名拘禮内懐於矜懼憂苦以至死者長年遐期非所貴也管夷吾曰吾旣告子養生矣送死柰何晏平仲曰送死略矣將何以告焉管夷吾曰吾固欲聞之平仲曰旣死豈在我哉焚之亦可沈之亦可瘞之亦可露之亦可衣薪而棄諸溝壑亦可衮衣繡裳而納諸石椁亦可唯所遇焉晏嬰墨者也自以儉省治身動遵法度非逹生死之分所以舉此二賢以明治身者唯取其奢儉之異也管夷吾顧謂鮑叔黃子曰生死之道吾二人進之矣當其有知則制不由物及其無知則非我所聞也子産鄭大夫公孫僑也鑄刑法於鼎事在昭六年相鄭專國之政三年善者服其化惡者畏其禁鄭國以治諸侯憚之而有兄曰公孫朝有弟曰公孫穆朝好酒穆好色朝之室也聚酒千鍾積麴成封望門百歩糟漿之氣逆於人鼻方其荒於酒也不知世道之安危人理之悔吝室內之有亡亡音無九族之親踈存亡之哀樂也雖水火兵刃交於前弗知也穆之後庭比頻密反房數十皆擇稚齒婑媠者婑音烏果切媠音奴坐反以盈之方其耼於色也屏屏上聲親眤絶交游逃於後庭以晝足即具反益也夜三月一岀意猶未愜鄉有處子之娥姣廣雅云好也者必賄而招之媒而挑蒼頡篇云挑謂招呼也說文作誂相誘也誂大了反之弗獲而後已子産日夜以爲戚密造夲作造七到反鄧析而謀之曰僑聞治身以及家治家以及國此言自於近至於逺也僑爲國則治矣而家則亂矣其道逆邪將奚方以救二子子其詔之鄧析曰吾怪之久矣未敢先言子奚不時其治也喻以性命之重誘以禮義之尊乎子産用鄧析之言因間音閑以謁其兄弟而告之曰人之所以貴於禽獸者智慮智慮之所將者禮義禮義成則名位至矣若觸情而動耼於嗜慾則性命危矣子納僑之言則朝自悔而夕食禄矣朝穆曰吾知之久矣擇之亦久矣覺事行多端選所好而爲之耳豈待若言而後識之哉凡生之難遇而死之易及以難遇之生俟易及之死可孰念哉而欲尊禮義以夸人矯情性以招名吾以此爲弗若死矣逹哉此言若夫刻意從俗違性順物失當身之蹔樂懐長愁於一世雖支體具存實鄰於死者爲欲盡一生之觀窮當年之樂唯患腹溢而不得恣口之飲力憊而不得肆情於色不遑憂名聲之醜性命之危也且若以治國之能夸物欲以說一夲作爲辭辭亂我之心榮禄喜我之意不亦鄙而可憐哉我又欲與若别之别之猶辨也夫善治外者物未必治而身交苦善治内者物未必亂而性交逸以若之治外其法可蹔行於一國未合於人心以我之治内可推之於天下君臣之道息矣吾常欲以此術而喻之若反以彼術而敎我哉子産忙然無以應之他日以告鄧析鄧析曰子與眞人居而不知也孰謂子智者乎鄭國之治偶耳非子之功也不知眞人則不能治國治國者偶爾此一篇辭義大逕挺抑抗不似君子之音氣然其㫖欲去自拘束者之累故有過逸之言者耳衛端木叔者子貢之世也藉其先貲家累萬金不治世故放意所好其生民之所欲爲人意之所欲玩者無不爲也無不玩也牆屋臺榭園囿池沼飲食車服聲樂嬪御擬齊楚之君焉至其情所欲好耳所欲聽目所欲視口所欲嘗雖殊方偏偏邊國非齊土之所産育者無不必致之猶藩牆之物也及其游也雖山川阻險塗逕修遠無不必之猶人之行咫歩也賔客在庭者日百住色主反一夲作往庖㕑之下不絶煙火堂廡之上不絶聲樂奉養之餘先散之宗族宗族之餘次散之邑里邑里之餘乃散之一國行年六十氣幹將衰棄其家事都散其庫藏珍寳車服妾媵一年之中盡焉不爲子孫留財及其病也無藥石之儲及其死也無瘞埋之資逹於理者知萬物之無常財貨之蹔聚聚之非我之功也且盡奉養之宜散之非我之施也且明物不常聚若斯人者豈名譽所勸禮法所拘哉一國之人受其施者相與賦而藏之反其子孫之財焉禽骨墨子弟子也聞之曰端木叔狂人也辱其祖矣叚干生聞之曰端木叔逹人也徳過其祖矣其所行也其所爲也衆意所驚而誠理所取衛之君子多以禮敎自持固未足以得此人之心也孟孫陽問楊子曰有人於此貴生愛身以蘄不死可乎曰理無不死以蘄久生可乎曰理無久生生非貴之所能存身非愛之所能厚且乆生奚爲設令乆生亦非所願五情好惡古猶今也四體安危古猶今也世事苦樂古猶今也變易治亂古猶今也旣聞之矣旣見之矣旣更之矣百年猶厭其多况久生之苦也乎夫一生之經厯如此而已或好或惡或安或危如循環之無窮若以爲樂邪則重來之物無所復欣若以爲苦邪則切己之患不可再經故生彌乆而憂彌積也孟孫陽曰若然亡愈於乆生則踐音踐一夲作蹈刃入湯火得所志矣楊子曰不然旣生則廢而任之究其所欲以俟於死但當肆其情以待終耳將死則廢而任之究其所之以放於盡制不在我則無所顧戀也無不廢無不任何遽遲於其間乎楊朱曰伯成子高不以一毫利物音捨國而隱耕大禹不以一身自利一體偏枯古之人損一毫利天下不與也悉天下奉一身不取也人人不損一毫人人不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一世汝爲之乎疑楊子貴身太過故發此問也楊子曰世固非一毛之所濟嫌其不逹己趣故亦相荅對也禽子曰假濟爲之乎楊子弗應禽子岀語魚據切孟孫陽孟孫陽曰子不逹夫子之心吾請言之有侵若肌膚獲萬金者若爲之乎曰爲之孟孫陽曰有斷音短若一節得一國子爲之乎禽子黙然有間孟孫陽曰一毛微於肌膚肌膚微於一節省矣省察然則積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物柰何輕之乎禽子曰吾不能所以荅子然則以子之言問老耼關尹則子言當矣耼尹之敎貴身而賤物也以吾言問大禹墨翟則吾言當矣禹翟之敎忘己而濟物也孟孫陽因顧與其徒說他事楊朱曰天下之美歸之舜禹周孔天下之惡歸之桀紂然而舜耕於河陽陶於雷澤四體不得蹔安口腹不得美厚父母之所不愛弟妹之所不親行年三十不告古沃反告上曰告發下曰誥而娶及受堯之禪年已長智已衰商均不才禪位於禹戚戚然以至於死此天人窮毒者也鮌古夲反禹父名夲又作治水土績用不就殛諸羽山禹纂業事讐惟荒土功子産不字過音戈門不入身體偏枯手足胼胝及受舜禪卑宮室美紱冕戚戚然以至於死此天人之憂苦者也武王旣終成王幼弱周公攝天子之政召公不恱四國流言居東三年誅兄放弟僅免其身戚戚然以至於死此天人之危懼者也孔子明帝王之道應時君之聘伐𣗳於宋削迹於衛窮於商周圍於陳蔡受屈於季氏見辱於陽虎戚戚然以至於死此天民之遑者也凡彼四聖者生無一日之歡死有萬世之名名者固非實之所取也雖稱之弗知雖賞之不知與株塊無以異矣觀形即事憂危之迹著矣求諸方寸未有不嬰拂其心者將明至理之言必舉美惡之極以相對偶者也桀藉累世之資居南靣之尊智足以距羣下威足以震海内恣耳目之所娛窮意慮之所爲熈熈然以至於死此天民之逸蕩者也紂亦藉累世之資居南靣之尊威無不行志無不從肆情於傾宫縱欲於長夜不以禮義自苦熈熈然以至於誅此天民之放縱者也彼二凶也生有從欲之歡死愚暴之名實者固非名之所與也雖毁之不知雖稱之弗知此與株塊奚以異矣盡驕奢之極恣無厭之性雖養以四海未始愜其心此乃憂苦窮年也彼四聖雖美之所歸苦以至終同歸於死矣彼二凶雖惡之所歸樂以至終亦同歸於死矣楊朱見梁王言治天下如運諸掌梁王曰先生有一妻一妾而不能治三畝之園而不能芸而言治天下如運諸掌何也對曰君見其牧羊者乎百羊而羣使五尺童子荷菙而隨之欲東而東欲西而西使堯牽一羊舜荷菙而隨之則不能前矣且臣聞之吞舟之魚不游枝流鴻鵠高飛不集汚池何則其極遠也黃鍾大吕不可從煩奏之舞何則其音䟽也將治大者不治細成大功者不成小此之謂矣楊朱曰太古之事滅矣孰誌之哉三皇之事若存若亡五帝之事若覺音敎若夢三王之事或隱或顯億不識如字又音誌下同一當身之事或聞或見萬不識一目前之事或存或廢千不識一太古至于今日年數固不可勝紀但伏羲已來三十餘萬歲賢愚好醜成敗是非無不消滅但遲之間耳以遲而致惑奔競而不已豈不鄙哉矜一時之毁譽以焦苦其神形要一遙反死後數百年中餘名豈足潤枯骨何生之樂哉楊朱曰人肖天地之𩔖懐五常之性肖似也𩔖同隂陽性禀五行也有生之最靈者人也人者爪牙不足以供守衛肌膚不足以自捍禦趨走不足以逃利害無毛羽以禦寒暑必將資物以爲養性任智而不恃力故智之所貴存我爲貴力之所賤侵物爲賤然身非我有也旣生不得不全之物非我有也旣有不得不去之身固生之主物亦養之主雖全生身不可有其身雖不去物不可有其物有其物有其身是横私天下之身橫私天下之物其唯聖人乎知身不可私物不可有者唯聖人可也公天下之身公天下之物其唯至人矣此之謂至至者也天下之身同之我身天下之物同之我物非至人如何旣覺私之爲非又知公之爲是故曰至至也楊朱曰生民之不得休息爲四事故一爲壽不敢恣其嗜慾二為名不敢恣其所行三爲位岀意求通四爲貨專利惜費有此四者畏鬼畏人畏威畏刑此謂之遁人也違其自然者也可殺可活制命在外全則不係於己不逆命何羡壽不矜貴何羡名不要勢何羡位不貪富何羡貨此之謂順民也得其生理天下無對制命在內外物所不能制故語有之曰人不㛰宦情欲失半人不衣食君臣道息周諺曰田父可坐殺晨岀夜入自以性之恒啜菽茹藿自以味之極肌肉麤厚筋節㟡急筋節急也或作䑏㟡上音權下區位反暌醜筋急貌曰㟡音區位切一朝處以柔毛綈幕薦以肉蘭橘心㾓一錯反體煩内熱生病矣商魯之君與田父侔地則亦不盈一時而憊矣言有所安習者皆不可卒改易况自然乎故野人之所安野人之所美謂天下無過者昔者宋國有田夫常衣緼黂房未反緼黂謂分弊麻絮衣也韓詩外傳云異色之衣也又音汾黂亂麻僅以過冬曁春東作自曝於日不知天下之有廣厦隩室綿纊狐狢音鶴顧謂其妻曰負日之暄人莫知者以獻吾君將有重賞里之富室告之曰昔人有美戎菽甘枲莖枲胡枲也蒼頡篇云萛耳也一名蒼耳枲俗音此萛思上聲芹萍爾雅云萍䓑也又苹蕭也郭注令蒿也初生亦可食也子者對鄉豪稱之鄉豪里之貴者鄉豪取而甞之蜇蜇音哲於口慘於腹慘蜇痛也衆哂而怨之其人大慙子此𩔖也楊朱曰豐屋美服厚味姣音絞色有此四者何求於外有此而求外者無猒之性無猒之性隂陽之蠧也非但累正身乃侵損正氣忠不足以安君適足以危身義不足以利物適足以害生安上不由於忠而忠名滅焉利物不由於義而義名絶焉君臣皆安物我兼利古之道也鬻子曰去名者無憂老子曰名者實之賔而悠悠者趨名不已名固不可去名固不可賔邪今有名則尊榮亡名則卑辱尊榮則逸樂卑辱則憂苦憂苦犯性者也逸樂順性者也斯實之所係矣名胡可去名胡可賔但惡夫守名而累實守名而累實將恤危亡之不救豈徒逸樂憂苦之間哉列子卷七
