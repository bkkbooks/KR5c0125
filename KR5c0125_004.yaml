body:
  text: 列子卷四晉張湛注唐殷敬慎釋文仲第四智者不知而自知者也忘智故無所知用智則無所能知體神而獨運忘情而任理則寂然玄照者也仲間間音間居子貢入侍而有憂色子貢不敢問子貢雖不及性與天道至於夫子文章究聞之矣聖人之無憂常流所不及況於賜哉所以不敢問者將發明至理推起余於大賢然後微言乃宣耳出告顔回顔回援琴而歌孔子聞之果召回入問曰若奚獨樂回曰夫子奚獨憂回不言欲宣問故弦歌以激發夫子之言也孔子曰先言爾志曰吾昔聞之夫子曰樂天知命故不憂回所以樂也天者自然之分命者窮逹之數也孔子愀七小反然有間愀然變色少時曰有是言哉將明此言之不至故示有疑間之色汝之意失矣此吾昔日之言爾請以今言為正也昔日之言因事而興今之所明盡其極也汝徒知樂天知命之無憂未知樂天知命有憂之大也無所不知無所不樂無所不憂故曰大也今告若其實修一身任窮達知去來之非我亡變亂於心慮爾之所謂樂天知命之無憂也此直能定內外之分辨榮辱之境如斯而已豈能無可無不可歟曩吾修詩書正禮樂將以治天下遺唯季反來世詩書禮樂治世之具聖人因而用之以救一時之弊用失其道則無益於理也非但修一身治魯國而巳夫聖人智周萬物道濟天下若安一身救一國非所以為聖也而魯之君臣日失其序仁義益衰情性益薄此道不行一國與當年其如天下與來世矣治世之術實須仁義世既治矣則所用之術宜廢若會盡事終執而不則情之者寡而利之者衆衰薄之始誠由於此以一國而觀天下當今而觀來世致弊豈異唯圓通無者能惟變所適不滯一方吾始知詩書禮樂無救於治亂而未知所以革之之方此樂天知命者之所憂唯棄禮樂之失不棄禮樂之用禮樂故不可棄故曰未知所以革之之方而引此以為憂者將為下義張本故先有此言耳雖然吾得之矣夫樂而知者非古人之謂所樂知也莊子曰樂窮通物非聖人故古人不以無樂為樂亦不以無知為知任其所樂則理自無樂任其所知則理自無知無樂無知是真樂真知都無所樂都無所知則能樂天下之樂知天下之知而我無心者也故無所不樂無所不知無所不憂無所不為居宗體備故能無為而無不為也詩書禮樂何棄之有革之何為若欲捐詩書易治術者豈救弊之道即而不去為而不恃物自全矣顔回北面拜手曰回亦得之矣所謂不違如愚者也出告子貢子貢茫然自失未能盡符至言故遂至自失也歸家淫思七日不寢不食以至骨立發憤思道忘眠食也顔回重往喻之乃反丘門弦歌誦書終身不輟既悟至理則亡餘事陳大夫聘魯私見叔孫氏叔孫曰吾國有聖人曰非孔丘邪曰是也何以知其聖乎至哉此問夫聖人之道絶於群智之表萬物所不窺擬見其會通之迹因謂之聖耳豈識所以聖也叔孫氏曰吾常聞之顔回至哉此答自非體二備形者何能言其髣佛瞻其先後乎以顔子之量猶不能為其稱謂況下斯者乎曰孔丘能廢心而用形此顔回之辭夫聖人既無所廢亦無所用廢用之稱亦因事而生耳故俯仰萬機對接世務皆形迹之事耳冥絶而灰寂者固泊然而不動矣陳大夫曰吾國亦有聖人子弗知乎曰聖人孰謂曰老聃之弟子有亢倉子音庚桑名楚史記作亢倉子賈逵姓氏英覽云吳郡有庚桑姓稱為七族者得聃之道老聃猶不言自得其道亢倉於何得之蓋寄得名以明至理之不絶於物理者耳能以耳視而目聽夫形質者心智之室宇耳目者視聽之户牖神茍撤焉則視聽不因户牖照察不閡牆壁耳魯侯聞之大驚不怪仲之用形而怪耳目之易任迹同於物故物無駭心使上卿厚禮而致之亢倉子應聘而至泛然無心者無東西之非已魯侯卑辭請問之亢倉子曰傳之者妄我能視聽不用耳目不能易耳目之用夫易耳目之用者未是都無所用都無所用者則所假之器廢也魯侯曰此增異矣其道奈何寡人終願聞之亢倉子曰我體合於心此形智不相違者也心合於氣此又逺其形智之用任其泊然之氣也氣合於神此寂然不動都忘其智智而都忘則神理獨運感無不通矣神合於無同無則神矣同神則無矣二者豈有形乎直有其智者不得不親無以自通忘其心者則與無而為一也其有介然之有唯唯癸反然之音雖逺在八荒之外近在眉之內來干我者我必知之唯豁然之無不干聖慮耳涉於有分神明所照不以逺近為差也乃不知是我七孔四支之所覺心腹六藏之所知其自知而已矣所適都忘豈復覺知之至邪魯侯大悅他日以告仲仲笑而不答亢倉言之盡矣仲將何所云今以不答為答故寄之一笑也商太宰商宋國也宋都商丘故二名焉太宰官名見孔子曰丘聖者歟孔子曰聖則丘何敢世之所謂聖者據其迹耳豈知所以聖所以不聖者哉然則丘博學多識者也示現博學多識耳實無所學實無所識也商太宰曰三王聖者歟孔子曰三王善任智勇者聖則丘不知曰五帝聖者歟孔子曰五帝善任仁義者聖則丘弗知曰三皇聖者歟孔子曰三皇善任因時者聖則丘弗知孔丘之博學湯武之干戈堯舜之揖讓羲農之簡朴此皆聖人因世應務之粗迹非所以為聖者所以為聖者固非言迹之所逮者也商太宰大駭世之所謂聖者孔子皆云非聖商太宰所以大駭也曰然則孰者為聖孔子動容有間曰西方之人聖豈有定所哉舉絶逺而言之也有聖者焉不治而不亂不以治治之故不可亂也不言而自信言者不信不化而自行為者則不能化此能盡無為之極也蕩蕩乎民無能名焉何晏無名論曰為民所譽則有名者無譽無名者也若夫聖人名無名譽無譽謂無名為道無譽為大則夫無名者可以言有名矣無譽者可以言有譽矣然與夫可譽可名者豈同用哉此比於無所有故皆有所有矣而於有所有之中當與無所有相從而與夫有所有者不同同類無逺而相應異類無近而不相違譬如隂中之陽陽中之隂各以物類自相求從夏日為陽而夕夜逺與冬日共為隂冬日為隂而朝逺與夏日同為陽皆異於近而同於逺也詳此異同而後無名之論可知矣凡所以至於此者何哉夫道者惟無所有者也自天地已來皆有所有矣然猶謂之道者以其能復用無所有也故雖處有名之域而沒其無名之象由以在陽之逺體而其自有隂之逺類也夏侯玄曰天地以自然運聖人以自然用自然者道也道本無名故老氏曰強為之名仲稱堯蕩蕩無能名焉下云巍巍成功則強為之名取世所知而稱耳豈有名而更當云無能名焉者邪夫唯無名故可得遍以天下之名名之然豈其名也哉惟此是喻而終莫悟是觀泰山之崇崛而謂元氣不浩茫者也丘疑其為聖弗知真為聖歟真不聖歟聖理冥絶故不可擬言唯疑之者也商太宰默然心計曰孔丘欺我哉此非常識所及故以為欺罔也子夏問孔子曰顔回之為人奚若子曰回之仁賢於丘也曰子貢之為人奚若子曰賜之辨賢於丘也曰子路之為人奚若子曰由之勇賢於丘也曰子張之為人奚若子曰師之莊賢於丘也猶務莊子夏避席而問曰然則四子者何為事夫子曰居吾語汝夫回能仁而不能反反變也夫守一而不變無權智以應物則所適必閡矣賜能辨而不能訥由能勇而不能怯師能莊而不能同辨而不能訥必虛忠信之實勇而不能怯必傷仁恕之道莊而不能同有違和光之義此皆滯於一方也兼四子之有以易吾吾弗許也四子各是一行之極設使兼而有之求變易吾之道非所許此其所以事吾而不二二疑也也會同要當寄之於聖人故欲罷而不能也子列子既師壺丘子林日損之師友伯昏瞀莫侯反人乃居南郭從之處者日數色主反而不及來者相尋雖復日日料簡猶不及盡也雖然子列子亦微焉列子亦自不知其數也朝朝相與辨無不聞師徒相與講肄聞於逺近而與南郭子連牆二十年不相謁請其道玄合故至老不相往來也相遇於道目若不相見者道存則視廢也門之徒役以為子列子與南郭子有敵不疑敵讎有自楚來者問子列子曰先生與南郭子奚敵子列子曰南郭子貌充心虛耳無聞目無見口無言心無知形無惕往將奚為充猶全也心虛則形全矣故耳不惑聲目不滯色口不擇言心不用知內外冥一則形無震動也雖然試與汝偕往閲閲音悅弟子四十人同行此行也豈復簡優劣計長短數有四十故直而記之也見南郭子果若欺魄焉魄片各反字書作欺大面醜也片各反而不可與接欺魄土人也一説云欺神凝形喪外物不能得窺之顧視子列子形神不相偶而不可與羣神役形者也心無思慮則貌無動用故似不相攝御豈物所得羣也南郭子俄而指子列子之弟子末行户郎反者與言偶在末行非有貴賤之位遇感而應非有心於物也衎衎然若專直而在一本作存雄者夫理至者無言及其有言則彼我之辨生矣聖人對接俯仰自同於物故觀其形者似求是而尚勝也子列子之徒駭之見其尸居則自同土木見其接物則若有是非所以驚反咸有疑色欲發列子之言子列子曰得意者無言進進音盡知者亦無言窮理體極故言意兼忘用無言為言亦言無知為知亦知方欲以無言廢言無知遣知希言傍宗之徒固未免於言知也無言與不言無知與不知亦言亦知比方亦復欲全自然處無言無知之域此即復是遣無所遣知無所知遣無所遣者未能離遣知無所知者曷嘗忘知固非自然而忘言知也亦無所不言亦無所不知亦無所言亦無所知夫無言者有言之宗也無知者有知之主也至人之心豁然洞虛應物而言而非我言即物而知而非我知故終日不言而無玄默之稱終日用知而無役慮之名故得無所不言無所不知也如斯而已汝奚妄駭哉不悟至妙之所會者更粗至髙之所適者反下而便怪其應寂之異容動止之殊貌非妄驚而何子列子學也上章云列子學乘風之道三年之後心不敢念是非口不敢言利害始得老商一眄而已五年之後心更念是非口更言利害老商始一解顔而笑七年之後從從音縱心之所念更無是非從口之所言更無利害夫子始一引吾並席而坐眄笑並坐似若有褒貶升降之情夫聖人之心應事而感以外物少多為度豈定於一方哉九年之後橫心之所念橫口之所言亦不知我之是非利害歟亦不知彼之是非利害歟外內進進音盡矣而後眼如耳耳如鼻鼻如口口無不同心凝形釋骨肉都融不覺形之所倚足之所履心之所念言之所藏如斯而已則理無所隱矣黃帝篇已有此章釋之詳矣所以重出者先明得性之極則乘變化而無窮後明順心之理則無幽而不照二章出各有攸可不察哉初子列子好遊壺丘子曰禦冦好遊遊何所好列子曰遊之樂所玩無故言所適常新也人之遊也觀其所見我之遊也觀其所變人謂凡人小人也惟覩榮悴殊觀以為休戚未覺與化俱往勢不暫停遊乎遊乎未有能辨其遊者人與列子遊則同所以遊則異故曰遊乎遊乎明二觀之不同也未有辨之者言知之者鮮壺丘子曰禦冦之遊固與人同歟而曰固與人異歟凡所見亦恆見其變茍無暫停之處則今之所見常非向之所見則觀所以見觀所以變無以為異者也玩彼物之無故不知我亦無故彼之與我與化俱往務外遊不知務內觀外遊者求備於物內觀者取足於身取足於身遊之至也求備於物遊之不至也人雖七尺之形而天地之理備矣故首圓足方取象二儀鼻隆口窊比象山谷肌肉連於土壤血脈屬於川瀆溫蒸同乎炎火氣息不異風雲內觀諸己靡有一物不備豈須仰觀俯察履涉朝野然後備所見於是列子終身不出自以為不知遊既間至言則廢其遊觀不出者非自匿於門庭者也壺丘子曰遊其至乎向者難列子之言遊也未論遊之以至故重敘也至遊者不知所適至觀者不知所視視音視內足於已故不知所適反觀於身故不知所視物物皆遊矣物物皆觀矣忘遊故能遇物而遊忘觀故能遇物而觀是我之所謂遊是我之所謂觀也我之所是蓋是無所是耳所適常通而無所凝滯則我之所謂遊觀故曰遊其至矣乎遊其至矣乎龍叔謂文摰摰音至文摰六國時人嘗醫齊威王或云春秋時宋國良醫也曾治齊文王使文王怒而病愈曰子之術微矣吾有疾子能已乎文摰曰唯命所聽聽平聲然先言子所病之證龍叔曰吾鄉譽不以為榮國毁不以為辱得而不喜失而弗憂視生如死視富如貧視人如豕無往不齊則視萬物皆無好惡貴賤視吾如人忘彼我也處吾之家如逆旅之不有其家觀吾之鄉如戎蠻之國天下為一凡此衆疾爵賞不能勸刑罰不能威盛衰利害不能易哀樂不能移固不可事國君交親友御妻子制僕𨽻夫人所以受制於物者以心有美惡體有利害茍能以萬殊為一貫其視萬物豈覺有無之異故天子所不能得臣諸侯不能得友妻子不能得親僕𨽻不能得狎也此奚疾哉奚方能已之乎文摯乃命龍叔背背音佩明而立文摰自後向明而望之既而曰嘻吾見子之心矣方寸之地虛矣幾聖人也子心六孔流通一孔不達舊説聖人心有七孔也今以聖智為疾者或由此乎非吾淺術所能已也無所由而常生者道也忘懷任遇通亦通窮亦通其無死地此聖人之道者也由生而生故雖終而不亡常也老子曰死而不亡者夀通攝生之理不失元吉之會雖至於死所以為生之道常存此賢人之分非能忘懷得自然而全者也由生而亡不幸也役智求全貴身賤物違害就利務內役外雖之於死益由於不幸也有所由而常死者亦道也行必死之理而之必死之地此事實相應亦自然之道也由死而死故雖未終而自亡者亦常常之於死雖未至於終而生理已盡亦是理之常也由死而生幸也犯理違順應死而未及於此此誤生者也故無用而生謂之道用道得終謂之常用聖人之道存亡得理也有所用而死者亦謂之道用道而得死者亦謂之常乘凶危之理以害其身亦道之常也季梁之死楊朱望其門而歌盡生順之道以至於亡故無所哀也隨梧之死楊朱撫其尸而哭生不幸而死故可哀也𨽻人之生𨽻人之死衆人且歌衆人且哭𨽻猶群輩也亦不知所以生亦不知所以死故哀樂失其中或歌或哭也目將眇者先睹睹音覩秋毫耳將聾者先聞蚋而鋭反飛口將爽者先辨淄淄音緇澠澠音乘淄水出魯郡萊蕪縣澠水西自北海郡千乘縣界流至壽光縣二水相合説符篇曰淄澠之合易牙嘗之爽差也淄澠水異味既合則難别鼻將窒者先覺焦朽焦朽有節之氣亦微而難别也體將僵僵音薑者先亟去吏反奔佚奔佚音奔逸僵仆也如顔淵知東野之御馬將奔也與人理亦然心將迷者先識是非耳目口鼻身心此六者常得中和之道則不可渝變居亢極之勢莫不頓盡故物之弊必先始於盈滿然後之於虧損矣窮上反下極盛必衰自然之數是以聖人居中履和視日之所見聽耳之所聞任體之所能順心之所識故智周萬物終身全具者也故物不至者則不反要造極而後還故聰明強識皆為暗昧衰迷之所資鄭之圃澤圃田也在中牟縣多賢有道德而隱默者也東里多才有治能而參國政者圃澤之役有伯豐子者役猶弟子行過過音戈東里遇鄧析析音錫鄧析鄭國辨智之士執兩可之説而時無抗者作竹書子産用之也鄧析顧其徒而曰為于偽反若舞彼來者奚若世或謂相嘲調為舞弄也其徒曰所願知也知猶聞也鄧析謂伯豐子曰汝知養養養養上音余亮下音余賞之義乎受人養而不能自養者犬豕之類也養物而物為我用者人之力也使汝之徒食而飽衣而息執政之功也喻彼為犬豕自以為執政者也長幼羣聚而為牢藉藉本作籍側戟反牢謂牲牢也同也籍謂以竹木圍繞又刺也周禮鱉人以時籍魚鱉蜄也又國語云羅簎魚也莊子云以臨牢柵李頥云牢豕室也柵木欄也文字雖異其意同也簎音橺庖厨之物奚異犬豕之類乎伯豐子不應非不能應機而不應伯豐子之從者越次而進曰大夫不聞齊魯之多機乎機巧也多巧能之人有善治土木者有善治金革者有善治聲樂者有善治書數者有善治軍旅者有善治宗廟者羣才備也而無相位者無能相使者事立則有所不周藝成則有所不兼巧遍而智敵者則不能相君御者也而位之者無知使之者無能而知之與能為之使焉不能知衆人之所知不能為衆人之所能羣才並為之用者不居知能之地而無惡無好無彼無此則以無為心者也故明者為視聰者為聽智者為謀勇者為戰而我無事焉荀粲謂傅嘏夏侯玄曰子等在世榮問功名勝我識減我耳嘏玄曰夫能成功名者識也天下孰有本不足而有餘於末者邪答曰成功名者志也局之所弊也然則志局自一物也固非識之所獨濟我以能使子等為貴而未必能濟子之所為也執政者乃吾之所使子奚矜焉鄧析無以應目其徒而退公儀伯以力聞諸侯堂溪公公儀堂溪氏也皆周賢士言之於周宣王王備禮以聘之公儀伯至觀形懦夫也懦弱也音奴亂反宣王心惑而疑曰女之力何如公儀伯曰臣之力能折之古反春螽螽音終一曰蝗也之股堪秋蟬之翼堪猶勝也王作色曰吾之力者能裂犀兕之革曵九牛之尾猶憾其弱汝折春螽之股堪秋蟬之翼而力聞天下何也公儀伯長息退席曰善哉王之問也臣敢以實對臣之師有商丘子者力無敵於天下而六親不知以未嘗用其力故也以至柔之道御物物無與對故其功不顯臣以死事之乃告臣曰人欲見其所不見視人所不窺欲得其所不得修人所不為人每攻其所難我獨為其所易故學視者先見輿薪學聽者先聞撞鐘夫有易於內者無難於外古人有言曰善力舉秋毫善聽聞雷霆亦此之謂也於外無難故名不出其一家道至功玄故其名不彰也今臣之名聞於諸侯是臣違師之教顯臣之能者也未能令名迹不顯也然則臣之名不以負其力者也猶免於矜故能致稱以能用其力者也善用其力者不用其力也不猶愈於負其力者乎矜能顯用中山公子牟者魏國之賢公子也公子牟文侯子作書四篇號曰道家魏伐得中山以邑子牟因曰中山公子牟也好與賢人遊不恤國事而悅趙人公孫龍公子牟公孫龍似在列子後而今稱之恐後人所增益以廣書義茍於統例無所乖錯而足冇所明亦奚傷乎諸如此皆存而不除樂正子輿之徒笑之公子牟曰子何笑牟之悅公孫龍也子輿曰公孫龍之為人也行無師學無友不祖宗聖賢也佞給而不中丁仲反雖才辨而不合理也漫衍而無家儒墨刑名亂行而無定家好怪而妄言愛竒異而虛誕其辭欲惑人之心屈人之口與韓檀木安反等肄之韓檀人姓名共習其業莊子云桓國公孫龍能勝人之口不能服人之心辨者之固公子牟變容曰何子狀公孫龍之過歟請聞其實不平其言故形於色罪狀龍太過故責其實驗也子輿曰吾笑龍之紿詒音待欺也下同孔穿孔穿孔子之孫世記云為龍弟子紿欺也言善射者能令後鏃中前括發發相及矢矢相屬前矢造準而無絶落後矢之括猶銜弦視之若一焉箭相連屬無絶落處前箭著後箭復中前箭而後所湊者猶銜弦視之如一物之相連也孔穿駭之龍曰此未其妙者逢蒲江反蒙之弟子曰鴻超怒其妻而怖之引烏號之弓綦衛史記云綦國之竹晉灼曰衛之苑多竹篠之箭烏號黃帝弓綦地名出美箭衛羽也射其目矢來注眸子而眶眶音匡不本作睫目瞬也下同睫且洽反矢隧隧音墜地而塵不揚箭行勢極雖著而不覺所謂強弩之末不能穿魯縞也是豈智者之言與公子牟曰智者之言固非愚者之所曉以此言戲子輿後鏃中前括鈞後於前同發發於前發則無不中也近世有人擲五木者擲百盧者人以為有道以告王夷甫王夷甫曰此無竒直後擲如前擲耳庾子嵩聞之曰王公之言暗得理皆此類也矢注眸子而眶不盡矢之勢也夫能量弓矢之勢逺近之分則入物之與不入在心手之所銓不患所差跌今設令至拙者暗射箭之所至要當其極當其極也則豪分不復進暗其極則隨逺近而制其深淺矣劉道真語張叔竒云當與樂彥輔論此云不必是中賢之所能孔顏射者則必知此湛以為形用之事理之粗者偏得其道則能盡之若庖丁之投刃匠石之運斤是偏達於一事不待聖賢而後能為之也子何疑焉樂正子輿曰子龍之徒焉得不飾其闕吾又言其尤者龍誑魏王曰有意不心夫心寂然無想者也若橫生意慮則失心之本矣有指不至夫以指求至者則必因我以正物因我以正物則未造其極唯忘其所因則彼此玄得矣惠子曰指不至也有物不盡在於粗有之域則常有有在於物盡之際則其一常在其一常在而不可分雖欲損之理不可盡唯因而不損即而不違則泰山之崇崛元氣之浩泯然為一矣惠子曰一尺之神日取其半萬世不竭也有影不移夫影因光而生光茍不移則影更生也夫萬物潛變莫不如此而惑者木悟故借喻於影惠子曰飛鳥之影未常動也髮引千鈞夫物之所以斷絶者必有不均之處處處皆均則不可斷故髮雖細而得稱重物者勢至均故也白馬非馬此論見存多有辨之者辨之者皆不𢎞通故闕而不論也孤犢未嘗有母不詳比義其負類反倫不可勝言也負猶背也類同也言如此之比皆不可備載也公子牟曰子不諭至言而以為尤也尤其在子矣尤失反在子輿夫無意則心同同於無也無指則皆至忘指故無所不至也盡物者常有常有盡物之心物既不盡而心更滯有也影不移者説在改也影改而更生非向之影墨子日影不移説在改為也髮引千鈞勢至等也以其至等之故故不絶絶則由於不等故墨子亦有此説也白馬非馬形名離也離猶分也白馬論曰馬者所以命形也白者所以命色也命色者非命形也尋此等語如何可解而猶不歷然孤犢未嘗有母非孤犢也此語近於鄙不可解樂正子輿曰子以公孫龍平原君之客字子秉或云趙人之鳴一本作公孫龍於馬并注無異於鳴亦作無異於馬云馬者曰馬論之義也云鳴者但鳴而無理取為義則長矣皆條也言龍之言無異於鳴而皆謂有條貫也設令發於餘竅子亦將承之既疾龍之辨又忿牟之辭故遂吐鄙慢之言也公子牟默然良久告退曰請待餘日更謁子論既忿氣方盛而不可理論故遜辭告退也堯治天下天下欲治故堯治之五十年不知天下治歟不治歟不知億兆之願戴巳歟不願戴巳歟夫道治於物者則治名滅矣治名既滅則堯不覺在物上物不覺在堯下顧問左右左右不知問外朝外朝不知問在野在野不知若有知者則治道未至也堯乃微服遊於康衢聞兒童謡曰立我蒸民莫匪爾極不識不知順帝之則蒸衆也夫能使萬物咸得其極者不犯其自然之性也若以識知制物之性豈順天之道哉堯喜問曰誰教爾為此言兒童曰我聞之大夫問大夫大夫曰古詩也當今而言古詩則今同於古也堯還宫召舜因禪以天下功成身退舜不辭而受之會至而應關尹喜曰在巳無居泛然無係豈有執守之所形物自著形物猶事理也事理自明非我之功也其動若水順水而動故若水也其靜若鏡應而不藏故若鏡也其應若響應而不唱故若響也故其道若物者也物自違道道不違物同於道者道亦得之善若道者亦不用耳亦不用目亦不用力亦不用心唯忘所用乃合道耳欲若道而用視聽形智以求之弗當矣瞻之在前忽焉在後用之彌滿六虛廢之莫知其所道豈有前後多少哉隨所求而應之亦非有心者所能得逺亦非無心者所能得近以有心無心而求道則逺近其於非當若兩忘有無先後其於無二心矣唯默而得之而性成之者得之自然無假者則無所失矣知而忘情能而不為真知真能也知極則同於無情能盡則歸於不為發無知何能情發不能何能為聚塊也積塵也此則府宅雖無為而非理也列子卷四
