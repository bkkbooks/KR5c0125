body:
  text: 列子卷一晉張湛注唐殷敬慎釋文天瑞第一夫巨細舛錯修短殊性雖天地之大羣品之衆涉於有生之分關於動用之域者存亡變化自然之符夫唯寂然至虛凝一而不變者非隂陽之所終始四時之所遷革子列子載子於姓上者首章或是弟子之所記故也居鄭圃音布鄭有圃田四十年人無識者非形不與物接言不與物交不知其德之至則同於不識者矣國君卿大夫視之猶衆庶也非自隔於物直言無是非行無軌迹則物莫能知也國不足年飢將嫁於衛自家而出謂之嫁弟子曰先生往無反期弟子敢有所謁先生將何以教先生不聞壺丘子林之言乎壺丘子林列子之師子列子笑曰壺子何言哉四時行百物生豈假於言哉雖然夫子嘗語伯昏瞀莫侯反人吾側聞之試以告女伯昏列子之友同學於壺子不言自受教於壷子者列子之謙言也其言曰有生今塊然之形也不生生物而不自生者也有化今存亡變改也不化化物而不自化者也不生者能生生不生者固生物之宗不化者能化化不化者固化物之主生者不能不生化者不能不化生者非能生而生化者非能化而化也直自不得不生不得不化者也故常生常化涉於有動之分者不得暫無也常生常化者無時不生無時不化生化相因存亡往復理無間也隂陽爾四時爾隂陽四時節變化之物而復屬於有生之域者皆隨此陶運四時改而不停萬物化而不息者也不生者疑獨不生之主豈可實而驗哉疑其冥一而無始終也不化者往復音服後不音者倣此其際不可終代謝無間形氣轉續其道不終疑獨其道不可窮亦何以知其窮與不窮哉直自疑其獨立而不改周行而不殆也黃帝書曰谷神不死古有此書今已不存夫谷虛而宅有亦如莊子之稱環中至虛無物故謂谷神本自無生故曰不死是謂玄牝毗忍反老子有此一章王弼注曰無形無影無逆無違處卑不動守靜不衰谷以之成而不見其形此至物也處卑而不可得名故謂之玄牝玄牝之門是謂天地之根綿綿若存用之不勤王弼曰門玄牝之所由也本其所由與太極同體故謂天地之根也欲言存邪不見其形欲言亡邪萬物以生故曰綿綿若存無物不成而不勞也故曰不勤故生物者不生化物者不化莊子亦有此言向秀注曰吾之生也非吾之所生則生自生耳生生者豈有物哉故不生也吾之化也非物之所化則化自化耳化化者豈有物哉無物也故不化焉若使生物者亦生化物者亦化則與物俱化亦奚異於物明夫不生不化者然後能為生化之本也自生自化自形自色自智自力自消自息皆自爾耳豈有尸而為之者哉謂之生化形色智力消息者非也若有心於生化形色則豈能官天地而府萬物瞻羣生而不匱乎子列子曰昔者聖人因隂陽以統天地天地者舉形而言隂陽者明其度數統理夫有形者生於無形謂之生者則不死無者則不生故有無之不相生理既然矣則有何由而生忽爾而自生忽爾而自生而不知其所以生不知所以生生則本同於無本同於無而非無也此明有形之自形無形以相形者也則天地安從生天地無所從生而自然生故曰有太易有太初有太始有太素此明物之自微至著變化之相因襲也太易者未見賢遍反注同氣也易者不窮滯之稱凝寂於太虛之域將何所見耶如易繫之太極老氏之渾成也太初者氣之始也隂陽未判即下句所謂渾淪也太始者形之始也隂陽既判則品物流形也太素者質之始也質性也既為物矣則方貟剛柔靜躁沈浮各有其性氣形質具而未相離此直論氣形質不復説太易太易為三者宗本於後句别自明之也故曰渾音魂淪音論下同渾淪者言萬物相渾淪而未相離力智反去也也雖渾然一氣不相離散而三才之道實潛兆乎其中淪語之助也視之不見聽之不聞循之不得故曰易也易無形埒不知此下一字老子曰視之不見名曰希如此曰希而此易易亦希簡之别稱也大易之義如此而已故能為萬化宗主冥一而不變者也易變而為一所謂易者窈冥惚恍不可變也一氣恃之而化故寄名變耳一變而為七七變而為九九變者究也究窮也一變而為七九不以次數者全舉陽數領其都會乃復變而為一一者形變之始也既涉於有形之域理數相推自一之九九數既終乃復反而為一反而為一歸於形變之始此蓋明變化往復無窮極清輕者上為天濁重者下為地天地何邪直虛實清濁之自分判者耳此一章全是周易乾鑿度也沖和氣者為人故天地精萬物化生推此言之則隂陽氣遍交會而氣和氣和而為人生人生則有所倚而立也子列子曰天地無全功聖人無全能萬物無全用全猶備也故天職生覆地職形載聖職教化物職所宜職主也生各有性性各有所冝者也然則天有所短地有所長聖有所否物有所通夫體適於一方者造餘塗則閡矣王弼曰形必冇所分聲必有所屬若溫也則不能涼若宫也則不能商何則生覆者不能形載形載者不能教化教化者不能違所宜順之則通也宜定者不出所位皆有素分不可逆也故天地之道非隂則陽聖人之教非仁則義萬物之宜非柔則剛此皆隨所宜而不能出所位者也方圓靜躁理不得兼然尋形即事則名分不可相干任理之通方圓未必相乖故二儀之德聖人之道燾育羣生澤周萬物盡其清寧貞粹而已則殊塗融通動靜澄一蓋由聖人不逆萬物之性萬物不犯聖人之化凡滯於一方者形分之所閡耳道之所運常冥通而無待故有生者有生生者有形者有形形者有聲者有聲聲者有色者有色色者有味者有味味者形聲色味皆忽爾而生不能自生者也夫不能自生則無為之本無為之本則無留於一象無係於一味故能為形氣之主動必由之者也生之所生者死矣而生生者未嘗終形之所形者實矣而形形者未嘗有聲之所聲者聞矣而聲聲者未嘗發色之所色者彰矣而色色者未嘗顯味之所味者嘗矣而味味者未嘗呈夫盡於一形者皆隨代謝而遷革矣故生者必終而生生物者無變化也皆無為之職也至無者故能為萬變之宗主也能隂能陽能柔能剛能短能長能圓能方能生能死能暑能涼能浮能沈能宫能商能出能沒能玄能黃能甘能苦能羶能香無知也無能也而無不知也而無不能也知盡則無知能極則無能故無所不知無所不能何晏道論曰有之為有待無以生事而為事由無以成夫道之而無語名之而無名視之而無形聽之而無聲則道之全焉故能昭音嚮而出氣物包形神而章光影玄以之黑素以之白矩以之方規以之圓圓方得形而此無形白黑得名而此無名也子列子適衛食於道從者見百嵗髑髏攓蓬而指攓音蹇拔也顧謂弟子百豐曰唯子與彼知而未嘗生未嘗死也俱涉變化之塗則子生而彼死推之至極之域則理既無生亦又無死也此過古卧反養乎此過歡乎遭形則不能不養遇生則不能不歡此過誤之徒非理之實當也種章勇反有幾居豈反先問變化種數凡有幾條然後明之於下若蛙為鶉事見墨子得水為繼音計司馬彪云謂水土之氣相繼而生也得水土之際則為蛙蠙步田反司馬彪云物根在水土際布在水中就水土視之不見鈔之可得如張縣在水中矣楚人謂之蛙蠙之衣之衣衣猶覆蓋生於陵屯音豚阜也陵屯髙潔處也則為陵舄此隨所生之處而變者也陵舄得鬱栖則為烏足此合而相生也烏足之根為蠐螬其葉為胡蝶根本也葉散也言烏足為蠐螬之本其末散化為胡蝶也胡蝶胥也胥皆也言物皆化也化而為蟲生竈下其狀若脫郭注爾雅云脫謂剝皮也其名曰鴝音衢掇丁括反鴝掇蟲名此一形之內變異者也鴝掇千日千日而死化而為鳥其名曰乾餘骨乾餘骨之沫為斯彌沫猶精華生起斯彌為食醯許兮反若酒上蠛蠓也下同頥輅上怡下路食醯頥輅生乎食醯黃軦音呪頥輅黃軦皆蟲名食醯黃軦生乎九猷李云九當作久久老也猷蟲名也九猷生乎瞀茂謀二音芮音蚋小蟲也瞀芮生乎腐音漸蠸音權一音歡謂瓜中黃甲蟲也此皆死而更生之一形者也羊肝化為地臯馬血之為轉鄰也説文作粦又作粦皆鬼火也淮南子云血為磷也音吝人血之為野火也此皆一形之內自變化也鷂之為鸇鸇之為布穀布穀久復為鷂也燕之為蛤也田鼠之為鶉也朽瓜之為魚也老韭之為莧也老羭音俞之為猿也羭牝羊也魚卵之為蟲此皆無所因感自然而變者也亶爰上蟬下袁之獸自孕而生曰類亶音蟬山海經云亶爰之山有獸其狀如狸而有髮其名曰類自為牝牡相生也河澤之鳥視而生曰鶂五歷反此相視而生者也莊子曰白鶂相視眸子不運而風化之也純雌其名大純雄其名稚古稚字蜂司馬彪云稚蜂細者取桑蟲祝之使似己子也龜龞之類也稚小也此無雌雄而自化上言蟲獸之理既然下明人道亦有如此者也思士不妻而感思女不夫而孕大荒經曰有思幽之國思士不妻思女不夫精氣潛感不假交接而生子也此亦白鶂之類也后稷生乎巨迹傳記云髙辛氏之妃名薑嫄見大人迹好而履之如有人理感已者遂孕因生后稷長而賢乃為堯佐即周祖也伊尹生乎空桑博記曰伊尹母居伊水之上既孕夢有神告之曰舊水出而東走無顧明日視舊出水告其鄰東走十里而顧其邑盡為水身因化為空桑有莘氏女子採桑得嬰兒于空桑之中故命之曰伊尹而獻其君令庖人養之長而賢為殷湯相厥昭生乎濕此因蒸潤而生醯雞生乎酒此因酸氣而生羊奚比音毗乎不筍此異類而相親比也久竹生青寧因於林藪而生青寧生程自從繼至於程皆生生之物蛇鳥蟲獸之屬言其變化無常或以形而變或死而更生終始相因無窮已也程生馬馬生人人久入於機萬物皆出於機皆入於機夫生死變化胡可測哉生於此者或死於彼死於彼者或生於此而形生之主未嘗暫無是以聖人知生不常存死不永滅一氣之變所適萬形萬形萬化而不化者存歸於不化故謂之機機者羣有之始動之所宗故出無入有散有反無靡不由之也黃帝書曰形動不生形而生影聲動不生聲而生響夫冇形必有影有聲必有響此自然而並生俱出而俱沒豈有相資前後之差哉郭象注莊子論之詳矣而世之談者以形動而影隨聲出而響應聖人則之以為喻明物動則失本靜則歸根不復曲通影響之義也無動不生無而生有有之為有恃無以生言生必由無而無不生有此運通之功必賴於無故生動之稱因事而立耳形必終者也天地終乎與我偕終料巨細計修短則與我殊矣會歸於終理固無差也終進乎不知也進當為盡此書盡字例多作進也聚則成形散則為終此世之所謂終始也然則聚者以形實為始以離散為終散者以虛漠為始以形實為終故迭相與為終始而理實無終無始者也道終乎本無始進乎本不久久當為有無始故不終無有故不盡有生則復於不生有形則復於無形生者反終形者反虛自然之數也不生者此不生者先有其生然後之於死滅非本不生者也本不生者初自無生無滅無形者此無形亦先有其形然後之於離散非本無形者也本無形者初自無聚無散者也夫生生物者不生形形物者無形故能生形萬物於我體無變今謂既生既形而復反於無生無形者此故存亡之往復爾非始終之不變者也生者理之必終者也終者不得不終亦如生者之不得不生生者不生而自生故雖生而不知所以生不知所以生則生不可絶不知所以死則死不可禦也而欲其生畫其終惑於數也畫亡也精神者天之分骨骸者地之分屬天清而散屬地濁而聚精神離形各歸其真天分歸天地分歸地各反其本故謂之鬼鬼歸也歸其真宅真宅太虛之域黃帝曰精神入其門骨骸反其根我尚何存何生之無形何形之無氣何氣之無靈然則心智形骸隂陽之一體遍積之一氣及其離形歸根則反其真宅而我無物焉人自生至終大化有四其間遷易無時暫停四者蓋舉大較而言者也嬰孩也少壯也老耄也死亡也其在嬰孩氣專志一和之至也物不傷焉德莫加焉老子曰含德之厚比於赤子其在少壯則血氣飄溢欲慮充起物所攻焉德故衰焉處力競之地物所不與也其在老耄則欲慮柔焉體將休焉物莫先焉休息也已無競心則物不與爭雖未及嬰孩之全方於少壯間矣其在死亡也則之於息焉反其極矣孔子逰於太山見榮啓期行乎郕音成魯邑名之野鹿裘帶索先各反鼓琴而歌孔子問曰先生所以樂音洛下同何也對曰吾樂甚多天生萬物唯人為貴而吾得為人是一樂也推此而言明人之神氣與衆生不殊所適者異故形貌不一是以榮啓期深測倚伏之緣洞識幽顯之驗故欣遇人形兼得男貴豈孟浪而言男女之别彼列反男尊女卑故以男為貴吾既得為男矣是二樂也人之將生男女亦無定分故復喜得男身人生有不見日月不免襁褓者吾既已行年九十矣是三樂也貧者士之常也死者人之終也處常得終當何憂哉孔子曰善乎能自寬者也不能都忘憂樂善其能推理自寬慰者耳林類年且百嵗書傳無聞蓋古之隱者也底春被裘拾遺穗於故畦收刈後田中棄穀拾之也並歌並進孔子適衛望之於野顧謂弟子曰彼叟可與言者試往訊之子貢請行逆之壠端面之而歎曰先生曾不悔乎而行歌拾穗林類行不留歌不輟子貢叩之不已乃仰而應於證反曰吾何悔邪子貢曰先生少不勤行下孟反下同長不競時老無妻子死期將至亦有何樂而拾穗行歌乎林類笑曰吾之所以為樂人皆有之而反以為憂我所以為樂者人人皆同但未能觸事而夷故無暫歡少不勤行長不競時故能夀若此不勤行則遺名譽不競時則無利欲二者不存於胸中則百年之夀不祈而自獲也老無妻子死期將至故樂若此所謂樂天知命故無憂也子貢曰夀者人之情死者人之惡子以死為樂何也林類曰死之與生一往一反故死於是者安知不生於彼故吾知其不相若矣吾又安知營營而求生非惑乎亦又安知吾今之死不愈昔之生乎尋此旨則存亡往復無窮已也子貢聞之不喻其意還以告夫子夫子曰吾知其可與言果然然彼得之而不盡者也卒然聞林類之言盛以為已造極矣而夫子方謂未盡夫盡者無所不盡亦無所盡然後盡理都全耳今方對無於有去彼取此則不得不覺內外之異然所不盡者亦少許處耳若夫萬變玄一彼我兩忘即理自夷而實無所遣夫冥內逰外同於人羣者豈有盡與不盡者乎子貢倦於學告仲尼曰願有所息學者所以求復其初乃至於厭倦則自然之理矣仲尼曰生無所息勞知慮役支體此生者之事莊子曰生為徭役子貢曰然則賜息無所乎仲尼曰有焉耳望其壙音曠墓穴也睪音臯如也宰如也墳如也鬲音歷形如鼎又音隔如也則知所息矣見其墳壤鬲異則知息之有所莊子曰死為休息也子貢曰大哉死乎君子息焉小人伏焉樂天知命泰然以待終君子之所以息去離憂苦昧然而死小人之所以伏也仲尼曰賜汝知之矣人胥知生之樂未知生之苦知老之憊未知老之佚知死之惡未知死之息也莊子曰太塊載我以形勞我以生佚我以老息我以死耳晏子曰善哉古之有死也生死古今所同而獨善古之死者明古人不樂生而惡死也仁者息焉不仁者伏焉修身慎行恆懷兢懼此仁者之所憂貪欲縱肆常無厭足此不仁者之所苦唯死而後休息寢伏之死也者德之徼音呌也德者得也徼者歸也言各得其所歸古者謂死人為歸人夫言死人為歸人則生人為行人矣行而不知歸失家者也一人失家一世非之天下失家莫知非焉此衆寡相傾者也晏子儒墨為家重形生者不辨有此言假託所稱耳有人去鄉土離六親廢家業遊於四方而不歸者何人哉世必謂之為狂蕩之人矣又有人鍾賢世鍾賢世宜言重形生矜巧能修名譽誇張於世而不知已者亦何人哉世必以為智謀之士此二者胥失者也此二者雖行事小異而並不免於溺喪也而世與一不與一唯聖人知所與知所去邱吕反注同以生死為寤寐者與之溺喪忘歸者去之或謂子列子曰子奚貴虛列子曰虛者無貴也凡貴名之所以生必謂去彼而取此是我而非物今有無兩忘萬異冥一故謂之虛虛既虛矣貴賤之名將何所生子列子曰非其名也事有實著非假名而後得也莫如靜莫如虛靜也虛也得其居矣取也與也失其所矣夫虛靜之理非心慮之表形骸之外求而得之即我之性內安諸已則自然真全矣故物以全者皆由虛靜故得其所安所以敗者皆由動求故失其所處事之破毀音毁而後有舞仁義者弗能復也當為之於未有治之於未亂乃至虧喪凋殘方欲鼓舞仁義以求反性命之極者未之得也粥音育熊周文王師封於楚著子書二十二篇曰運轉亡已天地密移疇覺之哉此則莊子舟壑之義孔子曰日夜無隙丘以是徂夫萬物與化為體體化而遷化不暫停物豈守故故向之形生非今形生俯仰之間而已涉萬變氣散形朽非一旦頓至而昧者操必化之器託不停之運自謂變化可逃不亦悲乎故物損於彼者盈於此成於此者虧於彼所謂川竭谷虛邱夷淵實也損盈成虧隨世隨死此世亦宜言生往來相接間不可省疇覺之哉成者方自謂成而已虧矣生者方自謂生潛已死矣凡一氣不頓進一形不頓虧亦不覺其成不覺其虧皆在冥中而潛化固非耳目所瞻察亦如人自世音生至老貌色智態亡日不異皮膚爪髮隨世音生下同隨落非嬰孩時有停而不易也形色髮膚有精粗者新故相換猶不可識况妙於此者乎間不可覺俟至後知杞國有人憂天地崩墜身亡所寄廢寢食者又有憂彼之所憂者因往曉之彼之所憂者惑矣而復以不惑憂彼之所惑不憂彼之所憂喻積惑彌深何能相喻也曰天積氣耳亡處亡氣若屈伸呼吸終日在天中行止奈何憂崩墜乎夫天之蒼蒼非硜然之質則所謂天者豈但逺而無所極邪自地而上則皆天矣故俯仰喘息未始離天也其人曰天果積氣日月星宿音秀下同不當墜邪曉之者曰日月星宿亦積氣中之有光耀者氣亦何所不勝雖天地之大猶自安於太虛之域况乃積氣相舉者也只使墜亦不能有所中丁仲反傷其人曰奈地壞何曉者曰地積塊耳充塞四虛亡處亡塊若躇步跐音此蹈徒到反四字皆踐踏之貌終日在地上行止奈何憂其壞其人音釋下同然大喜舍宜作釋此書釋字作曉之者亦然大喜此二人一以必敗為憂一以必全為喜此未知所以為憂喜也而互相慰喻使自解釋固未免於大惑也長廬子聞而笑之曰虹霓也雲霧也風雨也四時也此積氣之成乎天者也山嶽也河海也金石也火木也此積形之成乎地者也知積氣也知積塊也奚謂不壞夫混然未判則天地一氣萬物一形分而為天地散而為萬物此蓋離合之殊異形氣之虛實夫天地空中之一細物有中之最巨者難終難窮此固然矣難測難識此固然矣憂其壞者誠為大音泰逺言其不壞者亦為未是天地不得不壞則會歸於壞遇其壞時奚為不憂哉此知有始之必終有形之必敗而不識休戚與隂陽升降器質與天地顯沒也子列子聞而笑曰言天地壞者亦謬言天地不壞者亦謬壞與不壞吾所不能知也雖然彼一也此一也彼一謂不壞者也此一謂壞者也若其不壞則與人偕全若其壞也則與人偕亡何為欣戚於其間哉故生不知死死不知生來不知去去不知來壞與不壞吾何容心哉生之不知死猶死之不知生故當其成也莫知其毁及其毁也亦何知其成此去來之見驗成敗之明徴而我皆即之情無彼此何處容其心乎舜問乎丞曰道可得而有乎舜欲明羣有皆同於無故舉道以為發問之端曰汝身非汝有也汝何得有夫道郭象曰夫身者非汝所能有也塊然而自有耳有非所有而況無哉舜曰吾身非吾有孰有之哉據有此身故重發問曰是天地之委形也是一氣之偏積者也生非汝有是天地之委和也積和故成生耳性命非汝有是天地之委順也積順故有存亡耳郭象曰若身是汝有則美惡死生當制之由汝令氣聚而生汝不能禁也氣散而死汝不能止也明其委結而自成非汝之有也孫子非汝有是天地之委蛻音稅也氣自委結而蟬蛻耳若是汝有則男女多少亦當由汝也故行不知所往處不知所持食不知所以皆在自爾中來非知而為之也天地強陽氣也又胡可得而有邪天地即復委結中之最大者也今行處食息皆強陽氣之所運動豈識其所以然強陽猶剛實也非剛實理之至反之虛和之極則無形無生不死不終則性命何所委順子孫何所委蛻行處何所止泊飲食何所因假也齊之國氏大富宋之向氏大貧自宋之齊請其術國氏告之曰吾善為盜始吾為盜也一年而給二年而足三年大壤如掌反又作攘自此以往施以智反延也及州閭向氏大喜喻其為盜之言而不喻其為盜之道遂踰垣鑿室手目所及亡音無下同不探也未及時以贓獲罪沒其先居之財向氏以國氏之謬已也往而怨之國氏曰若為盜若何向氏言其狀國氏曰嘻音熙哀痛之聲若失為盜之道至此乎今將告若矣吾聞天有時地有利謂春秋冬夏方土出有也吾盜天地之時利雲雨之滂普浪反潤山澤之産育以生吾禾殖吾稼築吾垣建吾陸盜禽獸水盜魚鱉亡非盜也夫禾稼土木禽獸魚鱉皆天之所生豈吾之所有天尚不能自生豈能生物人尚不能自有豈能有物此乃明其自生自有也然吾盜天而亡殃天亡其施我公其心何往而有怨哉夫金玉珍寶穀帛財貨人之所聚豈天之所與天尚不能與豈人所能聚此亦明其自能自聚若盜之而獲罪孰怨哉人有其財我犯其私所以致咎向氏大惑以為國氏之重罔已也過東郭先生問焉東郭先生曰若一身庸非盜乎盜隂陽之和以成若生載若形況外物而非盜哉若其有盜邪則我身即天地之一物不得私而有之若其無盜邪則外內不得異也誠然天地萬物不相離力智反也認音仞而有之皆惑也夫天地萬物之都稱萬物天地之别名雖復各私其身理不相離認而有之心之惑也因此而言夫天地委形非我有也飭愛色貌矜伐智能已為惑矣至於甚者橫認外物以為已有乃標名氏以自異倚親族以自固整章服以耀物藉名位以動衆封殖財貨樹立權黨終身欣玩莫由自悟故老子曰吾所以有大患為吾身莊子曰百骸六藏吾誰與為親領斯旨也則方寸與太虛齊空形骸與萬物俱有也國氏之盜公道也故亡殃若之盜私心也故得罪公者對私之名無私則公名滅矣今以犯天者為公犯人者為私於理未至有公私者亦盜也直所犯之異耳未為非盜亡公私者亦盜也一身不得不有財物不得不聚復欲遣之非能即而無心者也公公私私天地之德生即天地之一理身即天地之一物今所愛吝復是愛吝天地之間生身耳事無公私理無愛吝者也知天地之德者孰為盜邪孰為不盜邪天地之德何邪自然而已自然而已何所歷其公私之名公私之名既廢盜與不盜理無差也列子卷一
