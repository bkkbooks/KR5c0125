body:
  text: 列子卷五晋張湛注唐殷敬慎釋文湯問第五夫智之所限知莫若其所不知而世齊所見以限物是以大聖發問窮理者對也殷湯殷湯姓子名履字天乙問於夏革夏棘字子棘為湯大夫革莊子音棘曰古初有物乎疑直混茫而已夏革曰古初無物今惡得物今所以有物由古有物故後之人将謂今之無物可乎後世必復以今世為古世則古今如循環矣設令後人謂今亦無物則不可矣殷湯曰然則物無先後乎夏革曰物之終始初無極已始或為終終或為始惡知其紀今之所謂終者或為物始所謂始者或是物終終始相循竟不可分也然自物之外自事之先朕所不知也謂物外事先廓然都無故無所指言也殷湯曰然則上下八方有極盡乎湯革雖相荅然而視聽猶未厯然故重發此問令盡然都了革曰不知也非不知也不可以智知也湯固問革曰無則無極有則有盡朕何以知之欲窮無而限有不知而推𩔖也然無極之外復無無極無盡之中復無無盡既謂之無何得有外既謂之盡何得有中所謂無無極無無盡乃眞極眞盡矣無極復無無極無盡復無無盡或者将謂無極之外更有無極無盡之中復有無盡故重明無極復無無極無盡復無無盡也朕以是知其無極無盡也而不知其有極有盡也知其無則無所不知不知其有則乃是眞知也湯又問曰四海之外奚有革曰猶齊州也爾雅云距齊以南戴日為丹穴北戴斗極為空桐距去也齊中也湯曰汝奚以實之革曰朕東行至營今之桞城古之營州東行至海是也人民猶是也如是間也問營之東復猶營也西行至豳人民猶是也問豳之西復猶豳也朕以是知四海四荒四極爾雅云九夷八狄七戎六蠻謂之四海觚竹北户西王母日下謂之四荒東㤗逺西邠國南濮鈆北祝栗謂之四極之不異是也四海四荒四極義見爾雅知其不異是間則是是矣故大小相含無窮極也含萬物者亦如含天地夫含萬物者天地容天地者太虚也含萬物也故不窮乾坤含化隂陽受氣庶物流形代謝相因不止於一生不盡於一形故不窮也含天地也故無極天地籠罩三光包羅四海大則大矣然形噐之物㑹有限極窮其限極非虚如何計天地在太虚之中則如有如無耳故凡在有方之域皆巨細相形多少相懸推之至無之極豈窮於一天極於一地則天地之與萬物互相包裹迭為國邑豈能知其盈虚測其頭數者哉朕亦焉知天地之表不有大天地者乎夫太虚也無窮天地也有限以無窮而容有限則天地未必形之大者然則鄒子之所言盖其掌握耳亦吾所不知也夫萬事可以理推不可以噐徴故信其心智所知及而不知所知之有極者膚識也誠其耳目所聞見而不知視聽之有限者俗士也至於逹人融心智之所滯𤣥悟智外之妙理豁視聽之所閡逺得物外之竒形若夫封情慮於有方之境循局歩於六合之間者將謂冩載盡於三墳五典歸藏窮於四海九州焉知太虚之遼廓巨細之無垠天地為一宅萬物為遊塵皆拘短見於當年昧然而俱終故列子闡無内之至言以坦心智之所滯恢無外之宏唱以開視聽之所閎使希風者不覺矜伐之自釋束敎者不知桎梏之自解故刳斫儒墨指斥大方豈直好竒尚異而徒為夸大哉悲夫耼周既獲譏於世論吾子亦獨以何免之乎然則天地亦物也物有不足故昔者女媧媧音瓜古天子風姓氏煉五色石以𥙷其闕隂陽失度三辰盈縮是使天地之闕不必形體虧殘也女媧神人故能煉五色之精以調和隂陽使晷度順序不必以噐質相𥙷也斷鼇之足鼇巨龜也以立四極其後共工氏與顓頊爭為帝怒而觸不周之山共工氏興霸於伏羲神農之間其後苖裔恃其彊與顓頊争為帝顓頊黄帝孫不周山在西北之極折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦音老歸焉湯又問物有巨細乎有修短乎有同異乎革曰渤海今樂安郡之東不知幾億萬里有大壑山海經云東海之外有大壑焉實惟無底之谷事見大荒經詩含神霧云東注無底之谷其下無底稱其無底者盖舉深之極耳上句云無無極限有不可盡實使無底亦無所閡名曰歸墟或作歸塘閭莊子云尾八紘九野之水天漢之流莫不注之而無增無減焉八紘八極也九野天之八方中央也世傳天河與海通其中有五山焉一曰岱輿二曰貟嶠三曰方壺一曰方丈四曰瀛洲五曰蓬萊史記曰方丈瀛洲蓬萊此三神山在渤海中盖常有至者諸仙人及不死之藥皆在焉未至望之如雲欲到即引而去終莫能至其山高下周旋三萬里其頂平處九千里山之中間相去七萬里以爲鄰居焉其上臺觀皆金玉其上禽獸皆純縞珠玕之樹皆叢生華實皆有滋味食之皆不老不死所居之人皆仙聖之種一日一夕飛相徃來者不可數色主反注同焉兩山間相去七萬里五山之間凡二十八萬里而日夜徃來者不可得數風雲之揮霍不足逾其而五山之根無所連著直畧反若此之山猶浮於海上以此推之則凡有形之域皆寄於太虚之中故無所根蔕常隨潮波上下徃還不得蹔峙焉仙聖毒毒病也之訴之於帝帝怒流於西極失羣聖之居乃命禺彊與隅同神仙傳曰北方之神名禺彊號曰𤣥冥子山海經曰大荒之中有神人靣鳥身名曰禺彊簡文云北海神也大荒經曰北極之神名禺彊靈龜為之使也使巨鼇列仙傳云巨鼇戴蓬萊山而扞滄海之中𤣥中記云即巨龜也十五舉首而戴之離騷曰巨鼇戴山其何以安也迭爲三番音翻更代也六萬歲一交焉五山始峙而龍伯之國有大人舉足不盈數色主反歩而曁五山之所一釣而連六鼇合負而趣歸其國灼其骨以數所據反筭計也焉以高下周圍三萬里山而一鼇頭之所戴而此六鼇復爲一鈎之所引龍伯之人能并而負之又鑚其骨以卜計此人之形當百餘萬里鯤鵬方之猶蚊蚋蚤虱耳則太虚之所受亦奚所不容哉於是岱輿貟嶠二山流於北極沈於大海仙聖之播遷者巨億計帝慿怒慿大也侵子禁反减龍伯之國使阨侵小龍伯之民使短至伏羲神農時其國人猶數十丈山海經云東海之外大荒之中有大人之國河圖玉板云從崑崙以北九萬里得龍伯之國人長四十丈生萬八千歲始死從中州以東四十萬里得僬僥國樵音譙僥短人國名也史記云僬僥氏三尺短之至也韋昭曰僬僥西南蠻之别名也按括地志在大秦國北也人長一尺五寸事見詩含神霧東北極有人名曰諍山海經曰東海之外有小人名曰諍人人長九尺見山海經詩含神霧云東北極有此人旣言其大因明其小耳荆之南有冥靈木名也生江南以葉生爲春落葉爲秋者以五百歲爲春五百歲爲秋上古有大椿木名也一名橓者以八千嵗爲春八千歲爲秋朽壤之上有菌芝者菌其隕反崔譔云糞土之芝也朝生暮死簡文云歘生之芝生於朝死於晦春夏之月有蠓蚋者謂蠛蠓蚊蚋也二者小飛蟲也因雨而生見陽而死終髮北之北莊子云窮髮有溟海十洲記云水黑色謂溟海者天池也有魚焉其廣數千里其長稱焉其名爲鯤鯨魚也有鳥焉其名爲鵬翼若垂天之雲其體稱焉莊子云鯤化爲鵬世豈知有此物哉翫其所常見習其所常聞雖語之猶將不信焉大禹行而見之伯益知而名彌正反與銘同之夷堅聞而志之記之也夫竒見異聞衆之所疑禹益堅豈直空言譎怪以駭一世盖明必有此物以遣執守者之固陋除視聽者之盲聾耳夷堅未聞亦古博物者也江浦之間生麽蟲麽細也亡果反字書云麽小也其名曰焦螟羣飛而集於蛟睫弗相觸也栖宿去來蛟弗覺也離朱子羽方晝拭眥在詣反目際也揚眉而望之弗見其形離朱黄帝時明目人能百歩望秋毫之末子羽未聞䚦除倚反俞古之聦耳人師曠方夜音愓耳俛首而聽之弗聞其聲䚦俞未聞也師曠晋平公時人夏革無緣得稱之此後著書記事者潤益其辭耳夫用心智頼耳目以視聽者未能見至微之物也唯黄帝與容成子居崆峒之上史記云黄帝至于河登崆峒之上今在醴泉郡同齋三月心死形廢所謂心同死灰形若枯木徐以神視神者寂然𤣥照而已不假於目塊然見之若嵩山之阿以有形渉於神明之境嵩山未足喻其巨徐以氣聽氣者任其自然而不資外用也砰普稱反然聞之若雷霆之聲以有聲渉於空寂之域雷霆之音未足以喻其大也吳楚之國有大木焉其名爲櫾山海經曰荆山多橘柚柚似橘而大皮厚味酸櫾音柚碧樹而冬生實丹而味酸食其皮汁已憤厥之疾氣疾也齊州珍之渡淮而北而化爲枳焉周禮曰橘渡淮北而化爲枳鸜鵒不踰濟貉音鶴似善睡獸也踰汶武申反則死矣酈元水經曰濟水岀王屋山爲沇音兖水東經温爲濟水下入黄河十餘里南渡河爲滎澤又經濟隂等九郡而入海周禮云鸜鵒不踰濟貉踰汶則死此地氣使然也鄭𤣥云汶水在魯城北先儒相因以爲魯之汶水皆大誤也案史記汶與㟭同武中反謂汶江也非音問之汶案山海經大江岀汶山郭云東南逕蜀郡東北逕巴東江夏至廣陵入海韓詩外傳云昔者江岀於汶山其始也足以濫觴是也又楚詞云隱汶山之清江固可明矣且列子與周禮通言水土性異則遷移有傷故舉四瀆以言之案今魯之汶水闊不踰數十步源不過二百里掲厲皆渡斯須徃還豈貉蹔游生死頓隔矣說文云貉𩔖也皆生長丘陵旱地今江邊人云不渡江是明踰越大水則傷夲性遂致死也地氣然也此事義見周官雖然形氣異也性鈞已無相易已生皆全已分皆足已吾何以識其巨細何以識其修短何以識其同異哉萬品萬形萬性萬情各安所適任而不執則鈞於全足不願相昜也豈智所能辨哉太形王屋二山形當作行太行在河内野王縣王屋在河東東垣縣方七百里高萬仞夲在兾州之南河陽之北北山愚公者俗謂之愚者未必非智也年且九十靣山而居懲山韓詩外傳云懲苦也北之塞岀入之迂也聚室而謀曰吾與汝畢力平險指通豫南逹于漢隂可乎雜然相許雜猶僉也其妻獻疑獻疑猶致難也曰以君之力曾不能損魁父淮南子作魁阜謂小山如堆阜之邱如太行王屋何魁父小山也在陳留界且焉置土石雜曰投諸渤海之尾隱土之北淮南云東北得州曰隱土遂率子孫荷胡可反擔者三夫即石墾壤箕畚音本籠也運於渤海之尾鄰人京城氏之孀妻孀寡也有遺男始齓初刃反韓詩外傳云男女七歲或毁齒謂之齓跳音調躍也或作跳誤也徃助之寒暑易節始一反焉河曲智叟而止之俗謂之智者未必非愚也曰甚矣汝之不惠以殘年餘力曾不能毁山之一毛其如土石何北山愚公長息曰汝心之固固不可徹曾不若孀妻弱子雖我之死有子存焉子又生孫孫又生子子又有子子又有孫子子孫孫無窮匱也而山不加增何苦而不平河曲智叟亡以應屈其理而服其志也操蛇之神聞之大荒經云山海神皆執蛇懼其不已也必其不已則山㑹平矣世咸知積小可以高大而不悟損多可以至少夫九層起於累土高岸遂為幽谷苟功無廢不期朝夕則無微而不積無大而不虧矣今砥礪之與刀劒相磨不已則知其將盡二物如此則邱壑消盈無所致疑若以大小遲爲惑者未能推𩔖也告之於帝帝感其誠感愚公之至心也命夸娥氏夸口花反二子夸娥氏傳記所未聞盖神力者也負二山一厝音昔朔東一厝雍南自此兾之南漢之隂無隴斷焉夫期功於旦夕者聞歲暮而致歎取美於當年者在身後而長悲此故俗士之近心一世之常情也至於大人以天地爲一朝億代爲曠息忘懐以造事無心而爲功在我之與在彼在身之與在人弗覺其殊别莫知其先後故北山之愚與妻之孤足以哂河曲之智嗤一世之惑悠悠之徒可不察歟夸父大荒經云有人珥两黄蛇踐兩黄蛇名曰夸父不量力欲追日影逐之於隅谷之際隅谷虞淵也日所入渇欲得飲赴飲河渭河渭不足將走北飲大澤未至道渇而死棄其杖尸膏肉所浸生鄧林鄧林彌廣數千里焉山海經云夸父死棄其杖而爲鄧林大禹曰六合之間四海之内照之以日月經之以星辰紀之以四時要之以太歲神靈所生其物其形或夭或夀唯聖人能通其道聖人順天地之道因萬物之性任其所適通其逆順使羣異各得其方夀夭咸盡其分也夏革曰然則亦有不待神靈而生不待隂陽而形不待日月而明夫生者自生形者自形明者自明忽然自爾固無所因假也不待殺戮而夭不待將迎而夀自夭者不由禍害自夀者不由接養不待五榖而食不待繒纊而衣不待舟車而行其道自然自然者都無所假也非聖人之所通也聖人不違自然而萬物自運豈樂通物哉自此章已上皆夏革所告殷湯也禹之治水土也迷而失塗謬之一國游絶垠之外者非用心之所逮故寄言迷謬也濵北海之北不知距齊州幾千萬里距去也其國名曰終北不知際畔之所齊子細反限無風雨霜露不生鳥獸蟲魚草木之𩔖四方悉平周以喬陟爾雅云喬高曲也又云三山襲陟郭璞云重隴也山之重壟也當國之中有山山名壺領狀若甔擔甀直爲反甔甀謂瓦缾也頂有口狀若貟環名曰滋宂有水湧岀名曰神瀵甫問反郭璞云今河東汾隂有水中如車輪許大濆沸湧岀其深無底名曰瀵山頂之泉曰瀵臭過蘭椒味過醪醴一源分爲四埒注於山下山上水流曰埒經營一國亡亡音無下同不悉徧土氣和亡札厲札厲疫死也人性婉而從物不競不争柔心而弱骨不驕不忌長幼儕士皆反居不君不臣男女雜游不媒不聘緣水而居不耕不稼土氣温適不織不衣百年而死不夭不病其民孳息也阜盛也亡數有喜樂亡衰老哀苦其俗好聲相擕而迭謡終日不輟音飢惓則飲神瀵力志和平過則醉經旬乃醒沐浴神瀵膚色脂澤香氣經旬乃歇周穆王北遊過其國三年忘歸旣反周室慕其國昌兩反然自失不進酒肉不召嬪御者數月乃復管仲勉齊桓公因游遼口俱之其國幾剋舉隰朋諫曰君齊國之廣人民之衆山川之觀殖物之阜禮義之盛章服之美妖靡盈庭忠良滿朝肆咤則徒卒百萬肆疑作叱視撝則諸侯從命視疑作指亦奚羡於彼而棄齊國之社稷從戎夷之國乎此仲父之耄柰何從之桓公乃止以隰朋之言告管仲仲曰此固非朋之所及也朋之知極於齊國豈知彼國之巨偉故管仲駭之也臣恐彼國之不可知之也齊國之富奚戀隰朋之言奚顧此國自不可得徃耳豈以朋之言故止也南國之人祝祝之六反孔安國注尚書云祝者斷截其髮也漢書云越人斷髮文身以避蛟龍之害一夲作恐誤髮而裸謂不以衣蔽之也力果反北國之人鞨鞨音末方言俗人帕頭是也帕頭懆頭也帕又作鞨又作帓帕亡八反懆七消反巾而裘中國之人冠冕而裳九土所資或農或商或田或漁如冬裘夏葛水舟陸車黙而得之性而成之夫方土所資自然而能故吳越之用舟燕朔之乗馬得之於水陸之宜不假學於賢智愼到曰治水者茨防决塞雖在夷貊相似如一學之於水不學之於禹也越之東有輒木又康之國其長子生則鮮杜預注左傳云人不以壽死曰鮮謂少也而食之謂之宜弟其大父死負其大母而棄之曰鬼妻不可以同居處楚之南有炎去聲夲作談人之國其親戚死㱙音朽其肉而棄然後埋其骨廼成爲孝子秦之西有儀渠又康之國者其親戚死聚柴積而焚之燻則煙上謂之登遐然後成爲孝子此上以爲政下以爲俗而未足爲異也此事亦見墨子孔子東游見兩小兒辯闘都豆反問其故一兒曰我以日始岀時去人近而日中時逺也一兒以日初岀逺而日中時近也一兒曰日初岀大如車蓋及日中則如盤盂此不為逺者小而近者大乎一兒曰日初岀滄滄初涼涼又夲作滄周書曰天地之間有滄熱善用道者終無竭孔注云滄寒也桓譚新論亦述此事作愴涼音潮涼涼字林云涼微寒及其日中如探湯此不爲近者熱而逺者涼乎孔子不能决也兩小兒曰孰爲汝多知乎所謂六合之外聖人存而不論二童子致未必不逹此㫖或𤣥相起子也均天下之至理也物物事事皆平皆均則理無不至也連於形物亦然連屬也屬於噐物者亦須平焉均髪均縣輕重而髮絶髮不均也髪甚微脆而至不絶者至均故也今所以絶者猶輕重相傾有不均處也均也其絶也若其均也寧有絶理莫絶言不絶也人以爲不然凡人不逹理也自有知其然者也㑹自有知此理爲然者墨子亦有此説何何楚人以善釣聞於國以獨繭絲爲綸芒鍼音亡箴爲鈎荆蓧夲作條爲竿剖粒爲餌引盈車之魚家語曰鯤魚其大盈車於百仭之淵汨流之中綸不絶鈎不伸竿不橈夫飾芳餌挂微鈎下沈青泥上乗驚波因水勢而施頡頏委縱與之沈浮及其弛絶故生而獲也楚王聞而異之召問其故何曰臣聞先大夫之言蒲且子余反子之弋也蒲且子古善弋射者弱弓纎繳音灼乗風振之連鶬於青雲之際用心專動手均也臣因其事放分兩反而學釣五年始盡其道當臣之臨河持竿心無雜慮唯魚之念投綸沈鈎手無輕重物莫能亂魚見臣之鈎餌猶沈埃聚沫吞之不疑所以能以弱制彊以輕致重也大王治國誠能若此則天下可運於一握將亦奚事哉楚王曰善善其此諭者以諷其用治國矣魯公扈趙齊嬰二人有疾同請扁鵲史記曰扁鵲渤海郡人姓秦氏善醫能視病盡見五藏之疾求治扁鵲治之旣同愈謂公扈齊嬰曰汝曩之所疾自外而干府藏者固藥石之所巳今有偕生之疾與體偕長今爲汝攻之何如二人曰願先聞其驗扁鵲謂公扈曰汝志彊而氣弱故足於謀而寡於斷志謂心智氣謂質性智多故多慮性弱故少決也齊嬰志弱而氣彊故少於慮而傷於專智少而任性則果而自用若換汝之心則均於善矣扁鵲遂飲二人毒酒迷死三日剖胷探心易而置之投以神藥旣悟如初二人辭歸於是公扈反齊嬰之室而有其妻子妻子弗識齊嬰亦反公扈之室有其妻子妻子亦弗識二子易心乗其夲識故各反其家各非故形故妻子不識也二室因相與訟求辨於扁鵲扁鵲辨其所由訟乃已此言恢誕乃書記少有然魏世華佗能刳腸易胃湔洗五藏天下理自有不可思議者信亦不可以臆斷故宜存而不論也瓠巴鼔琴而鳥舞魚躍瓠巴古善鼓琴人也鄭師文聞之師文鄭國樂師棄家從師襄游師襄亦古之善琴人也從其游學柱指鉤弦三年不成章按指調弦三年不能成曲師襄曰子可以歸矣嫌其難教師文舎其琴嘆曰文非弦之不能鉤非章之不能成文所存者不在弦所志者不在聲遺弦聲然後能盡聲弦之用也内不得於心外不應於器故不敢發手而動弦心手器三者𤣥應不相違失而後和音發矣且小假之以觀其後無幾何復見師襄師襄曰子之琴何如師文曰得之矣請甞試之於是當春而叩商弦以召南吕商金音屬秋南吕八月律涼風忽至草木成實得秋氣故成熟及秋而叩角弦以激夾鍾角木音屬春夾鍾二月律温風徐廻草木發榮得春氣故榮華當夏而叩羽弦以召黄鍾羽水音屬冬黄鍾十一月律霜雪交下川池暴沍得冬氣故凝隂水凍及冬而叩徴弦以激蕤賔徴火音属夏蕤賔五月律陽光熾烈堅冰立㪚得夏氣故消釋此一時彈琴無緣頓變四時盖舉一時之驗則三時可知且欲并言其所感之妙耳將終命官而揔四弦則景風翔慶雲浮甘露降灃泉涌至和之所致也師襄乃撫心高曰微矣子之彈也雖師矌之清角師矌爲晉平公奏清角一奏之有白雲從西北起再奏之大風至而雨隨之三奏之裂帷幕破爼豆飛廊瓦左右皆奔走平公恐伏晉國大旱赤地三年平公得聲者或吉或凶也鄒之吹律齊人爲燕昭王師居稷下號談天著書四十九篇又有終始五十六篇北方有地美而寒不生五穀鄒子吹律煖之而禾滋也亡亡音無以加之彼將挾琴執管而從子之後耳薛譚學謳於秦青二人並秦國之善歌者未窮青之渠綺反自謂盡之遂辭歸秦青弗止餞於郊衢撫節悲歌聲振林木響遏行雲薛譚乃謝求反終身不敢言歸秦青顧謂其友曰昔韓娥韓國善歌者也東之齊匱糧過音戈雍音邕地名杜預曰齊城門門鬻歌假食旣去而餘音繞梁欐三日不絶左右以其人弗去過逆旅逆旅人辱之韓娥因曼聲哀哭曼聲猶長引也一里一夲作十里老㓜悲愁垂涕相對三日不食遽而追之娥還復爲曼聲長歌一里老㓜喜躍抃舞弗能自禁音金忘向之悲也乃厚賂發之發猶遣也故雍門之人至今善歌哭放娥之遺聲六國時有雍門子名周善琴又善哭以哭干孟嘗君伯牙善鼔琴鍾子期善聽伯牙鼔琴志在登高山鍾子期曰善哉峩峩兮若泰山志在流水鍾子期曰善哉洋洋兮若江河伯牙所念鍾子期必得之伯牙游於泰山之隂卒逢暴雨止於巖下心悲乃援琴而鼔之初爲霖雨之操更造崩山之音曲每奏鍾子期輒窮其趣伯牙乃琴而嘆曰善哉善哉子之聽夫志想象猶吾心也言心闇合與已無異吾於何逃聲哉發音鍾子期已得其心則無處藏其聲也周穆王西廵狩越崑崙不至弇音奄山日入之所反還未及中國道有獻工人名偃師中道有國獻此工巧之人也穆王薦之薦當作進問曰若有何能偃師曰臣唯命所試然臣已有所造願王先觀之穆王曰日以俱來日謂别日吾與若俱觀之翌日偃師謁見王王薦之曰若與偕來者何人邪對曰臣之所造能倡者倡俳優也穆王驚視之趣音趍歩俯仰信人也巧夫顉駈音反曲頥也又五感反顉猶搖頭也其頥則歌合律捧其手則舞應節千變萬化惟意所適王以爲實人也與盛内御並觀之穆天子傳云盛穆王之美人技將終倡者瞬音舜其目而招王之左右侍妾王大怒立欲誅偃師偃師大懾立剖散倡者以示王皆傅㑹革木膠漆白黑丹青之所爲王諦料之内則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髪皆假物也而無不畢具者合㑹復如初見如向者之始見王也王試廢其心則口不能言廢其肝則目不能視廢其腎則足不能歩此皆以機關相使去其機關之主則不能相制御亦如人五藏有病皆外應七孔與四支也穆王始恱而嘆曰人之巧乃可與造化者同功乎詔貳車載之以歸近世人有言人靈因機關而生何者造化之功至妙故萬品咸育運動無方人藝麤拙但冩載成形塊然而已至於巧極則幾乎造化似或依此言而生此說而此書旣自不爾所以明此義者直以巧極思之無方不可以常理限故每舉物極以祛近惑豈謂物無神主也斯失之逺矣夫班輸之雲梯墨翟之飛鳶自謂能之極也班輸作雲梯可以凌虚仰攻墨子作木鳶飛三日不集弟子東門賈禽滑滑音骨狸墨翟弟子也聞偃師之巧以告二子二子終身不敢語藝而時執規矩時執規矩言其不敢數之也甘蠅古之善射者彀弓而獸伏鳥下箭無虚發而獸鳥不敢逸戰國策云更嬴虚發而鳥下也弟子名飛衛學射於甘蠅而巧過其師紀昌者又學射於飛衛飛衛曰爾先學不瞬而後可言射矣紀昌歸偃臥其妻之機下以目承牽挺牽挺機躡二年之後雖錐末倒都道反眥而不瞬也以告飛衛飛衛曰未也亞烏嫁反次也夲作必學學視而後可視小如大視微如著而後告我昌以音毛懸虱於牖南靣而望之旬日之間浸大也三年之後如車輪焉以覩餘物皆邱山也視虱如輪則餘物稱此而大焉乃以燕角之弧朔蓬之簳射食亦反之貫虱之心而懸不絶以彊弓勁矢貫虱之心言其用手之妙也以告飛衛飛衛高蹈拊膺曰汝得之矣紀昌旣盡衛之術計天下之敵已者一人而已乃謀殺飛衛相遇於野二人交射中路矢鋒相觸而墜於地而塵不揚飛衛之矢先窮窮盡也紀昌遺一矢旣發飛衛以棘刺之端扞之而無差焉於是二子泣而投弓相拜於塗請爲父子剋臂淮南子曰中國翣血越人契臂其一也許愼云剋臂岀血也翣所甲反以誓不得告術於人祕其道也此一章義例已詳於仲尼篇也造父之師曰泰豆氏泰豆氏見諸雜書記造父之始從習御也執禮甚卑泰豆三年不告造父執禮愈謹乃告之曰古詩言良弓之子必先爲箕良冶之子必先爲裘箕裘皆須柔屈𥙷接而後成噐爲弓冶者調筋角和金鐵亦然故學者必先攻其所易然後能成其所難所以爲諭也汝先觀吾趣趣行也趣如吾然後六轡可持六馬可御造父曰唯命所從泰豆乃立木爲塗僅可容足得安脚計歩而置䟽槪如其歩數履之而行走徃還無跌失也造父學之三日盡其巧泰豆嘆曰子何其敏也得之㨗乎敏疾也㨗速也凡所御者亦如此也曩汝之行得之於足應之於心推於御也齊輯乎輯音集說文云輯車輿也轡銜之際此言造父善御得車輿之齊整在於轡御之際喻人君得民心則國安矣而急緩乎脣吻之和正度乎胷臆之中而執節乎掌握之間內得於中心而外合於馬志是故能進退履䋲而旋曲中規矩取道致逺而氣力有餘誠得其術也得之於銜應之於轡得之於轡應之於手得之於手應之於心則不以目視不以策驅心閑體正六轡不亂而二十四蹄所投無差迴旋進退莫不中節與和鸞之聲相應也然後輿輪之外可使無餘轍馬蹄之外可使無餘地未嘗覺山谷之嶮原隰之夷視之一也吾術窮矣汝其識之夫行之所踐容足而已足外無餘而人不敢踐者此心不夷體不閑故也心夷體閑即進止有常數遲疾有常度茍盡其妙非但施之於身乃可行之於物雖六轡之煩馬足之衆調之有道不患其亂故輪外不恃無用之轍蹄外不頼無用之地可不謂然也魏黒以暱嫌殺邱邴章暱嫌私恨邱邴章之子來丹謀報父之讎丹氣甚猛形甚露計粒而食順風而趨雖怒不能稱兵以報之有膽氣而體嬴虚不能舉兵噐也耻假力於人誓手劒以屠黑黑卵悍志絶衆力抗百夫筋骨皮肉非人𩔖也延頸承刃披胸受矢鋩鍔上音芒下音諤摧屈而體無㾗撻負其材力視來丹猶雛鷇也鷇音㓂生而須哺曰鷇自食曰雛來丹之友申他音陁或音拖一夲作抱曰子怨黑至矣黑卵之易子過矣將奚謀焉來丹垂涕曰願子爲我謀申他曰吾聞衛孔周其祖得殷帝之寳劒一童子服之却三軍之衆奚不請焉來丹遂適衛見孔周執僕御之禮請先納妻子後言所欲孔周曰吾有三劒唯子所擇皆不能殺人且先言其状一曰含光視之不可見運之不知其有所觸也泯然無際經物而物不覺二曰承影將旦昧爽之交日夕昏明之際北靣而察之淡淡焉淡音艶若有物存莫識其狀其所觸也竊竊然有聲經物而物不疾也三曰宵練方晝則見影而不見光與日月同色也方夜見光而不見形言其照也其觸物也騞然而過騞呼麥反破聲又竹璧反隨過隨合覺疾而不血刃焉此三寳者傳之十三世矣而無施於事不能害物匣而藏之未嘗啓封來丹曰雖然吾必請其下者孔周乃歸其妻子與音預齋七日晏隂之間晏晚暮也跪而授其下劒來丹再拜受之以歸以其可執可見故受其下者來丹遂執劒從黑卵時黑卵之醉偃於牖下自頸至腰三斬之黑卵不覺來丹以黑之死趣而退遇黑之子於門擊之三下如投虚黑之子方曰汝何而三招一夲作拈奴兼反指取物也又音㸃予來丹知劔之不能殺人也嘆而歸黑卯旣醒怒其妻曰醉而露我使我嗌音益喉上也疾而腰急其子曰疇昔來丹之來遇我於門三招我亦使我體疾而支疆彼其厭於染反夲又作厭烏狎反我哉周穆王大征西戎西戎獻錕鋙之劒昆吾龍劒也河圖曰瀛州多積石名昆吾可爲劒尸子云昆吾之劒可切玉火浣音緩之布異物志云新調國有火州有火及䑕取其皮毛爲布名曰火浣其劒長尺有咫音止八寸曰咫練鋼赤刃用之切玉如切泥焉火浣之布浣之必投於火布則火色垢則布色岀火而振之皓然疑乎雪此周書所云皇子以爲無此物傳之者妄蕭叔曰皇子果於自信果於誣理哉此一章斷後而說切玉刀火浣布者明上之所載皆事實之言因此二物無虚妄者列子卷五
