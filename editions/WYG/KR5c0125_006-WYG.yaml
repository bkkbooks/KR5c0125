body:
  text: 列子卷六晉張湛註唐殷敬慎釋文力命第六命者必然之期素定之分也雖此事未驗而此理已然若以壽天存於御養窮達係於智力此惑於天理也力謂命曰若之功奚若我哉命曰汝奚功於物而欲比朕力曰壽夭窮達貴賤貧富我力之所能也命曰彭祖之智不出堯舜之上而壽八百顔淵之才不出衆人之下而壽十八仲尼之徳不出諸侯之下而厄於陳蔡殷紂之行不出三仁之上而居君位季札吳太伯之後賢而讓位棄其室而耕後封於延陵故號曰延陵季子無爵於吳田恒專有齊國夷齊餓於首陽季氏富於展禽若是汝力之所能奈何壽彼而夭此窮聖而達逆賤賢而貴愚貧善而富惡邪力曰若如若言我固無功於物而物若此邪此則若之所制邪命曰既謂之命奈何有制之者邪朕直而推之曲而任之自壽自夭自窮自達自貴自賤自富自貧不知所以然而然者命也豈可以制也朕豈能識之哉朕豈能識之哉此篇眀萬物皆有命則智力無施楊朱篇言人皆肆情則制不由命義例不一似相違反然治亂推移愛惡相攻情偽萬端故要時競其弊孰知所以是以聖人兩情而不辨將以大扶名教而致弊之由不可都塞或有持詐力以干時命者則楚子問鼎於周無知亂嫡於齊或有矯天真以殖名者則夷齊守餓西山仲由被醢於衛故列子叩其二端使萬物自求其中茍得其中則智動者不以權力亂其素分矜名者不以矯抑虧其形生發言之㫖其在於斯嗚呼覽者可不察哉北宫子謂西門子曰朕與子並世也而人子逹並族也而人子敬並貌也而人子愛並言也而人子庸並行也而人子誠並仕也而人子貴並農也而人子富並商也而人子利朕衣則裋音豎褐音曷方言裋複襦也許慎注淮南子云楚人謂袍為裋説文云粗衣也又敝布襦也又云襜揄短者曰裋揄有作短褐者誤荀子作豎褐揚倞注云僮豎之褐於義亦通食則粢即夷反糲令達反粢稻餅也味𩔖籺米不碎史記曰陳平食糠籺孟康云麥粮中不破者是也盖謂之粗舂粟麥為粢餅食之居則室出則徒行子衣則文錦食則粱肉居則連欐音麗屋棟出則結駟在家熙音怡字林云歡也然有棄朕之心在朝諤然有敖朕之色請謁不相及遨逰不同行固有年矣子自以徳過朕邪西門子曰予無以知其實汝造事而窮予造事而逹此厚薄之驗歟謂徳有厚薄也而皆謂與予並汝之顔厚矣北宫子無以應自失而歸中塗遇東郭先生先生曰汝奚徃而反偊偊邱羽反夲或作偊字林云䟽行貌而歩有深愧之色邪北宫子言其狀東郭先生曰吾將汝之愧與汝更之西門氏而問之曰汝奚辱北宮子之深乎固且言之西門子曰北宫子言世族年貌言行與予並而賤貴貧富與予異予語之曰予無以知其實汝造事而窮予造事而逹此將厚薄之驗歟而皆謂與予並汝之顏厚矣東郭先生曰汝之言厚薄不過言才徳之差吾之言厚薄異於是矣夫北宫子厚於徳薄於命汝厚於命薄於徳汝之逹非智得也北宫子之窮非愚失也皆天也非人也此自然而然非由人事巧拙也而汝以命厚自矜北宫子以徳厚自愧皆不識夫固然之理矣西門子曰先生止矣予不敢復言聞理而服北宫子旣歸衣其裋褐有狐貉之温進其茙菽茙音戎菽音叔爾雅云茙菽謂之荏菽即胡荳也管子云齊桓公北伐山戎得冬葱及茙菽布之天下鄭𤣥云即大豆也有稻粱之味庇其蓬室若廣厦之䕃乗其蓽輅音路左傳云柴車也若文軒之飾終身逌然自得貌後楊朱篇義同不知榮辱之在彼也在我也一逹於理則外物多少不足以槩意也東郭先生聞之曰北宫子之寐乆矣一言而能寤易怛也哉當割反或作悟者非管夷吾鮑叔牙並潁上人也二人相友甚戚同處於齊管夷吾事公子糾鮑叔牙事公子小白齊公族多寵嫡庶並行齊僖公母弟夷仲年生公孫無知僖公愛之令禮秩同於太子也國人懼亂管仲與召夲作卲忽奉公子糾奔魯糾襄公之次弟鮑叔奉公子小白奔莒音舉小白糾之次弟旣而公孫無知作亂襄公立絀無知秩服遂殺襄公而自立國人尋殺之齊無君二公子爭入管夷吾與小白戰於莒道射食亦反中小白帶鉤小白旣立小白即桓公也脅魯殺子糾召忽死之管夷吾囚齊告魯曰子糾兄弟弗忍加誅請殺之召忽管仲讐也請得而甘心醢之不然將㓕魯魯患之遂殺子糾召忽自殺管仲請囚也鮑叔牙謂桓公曰管夷吾能可以治國桓公曰我讎也願殺之鮑叔牙曰吾聞賢君無私怨且人能為其主亦必能為人君如欲霸王于况反非夷吾其弗可君必音釋之遂召管仲魯歸之齊鮑叔牙郊迎釋其囚桓公禮之鮑叔親迎管仲於堂阜而脫其桎梏於齊郊而見桓公也而位於高國之上鮑叔牙以身下之高國齊之世族任以國政號曰仲父桓公遂霸管仲嘗嘆曰吾少窮困時嘗與鮑叔賈音古分財多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而大窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗三戰三北鮑叔不以我為怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥名不顯於天下也生我者父母知我者鮑叔也此世稱管鮑善交者小白善用能者然實無善交實無用能也實無善交實無用能者非更有善交更有善用能也此明理無善交用能非但管鮑桓公而已召忽非能死不得不死鮑叔非能舉賢不得不舉小白非能用讎不得不用此皆冥中自相驅使非人理所制也及管夷吾有病小白問之曰仲父之病疾矣可不諱云言病之甚不可復諱而不言也至於大病則寡人惡乎屬國而可夷吾曰公誰欲歟小白曰鮑叔牙可曰不可其為人潔廉善士也清己而已其於不已若者不比之人欲以己善齊物也一聞人之過終身不忘不能棄瑕録善使之理國上且鉤乎君下且逆乎民必引君令其道不𢎞道茍不𢎞則逆民而不能納矣其得罪於君也將弗乆矣小白曰然則孰可對曰勿己則隰朋可非君然而可也其為人也上忘而下不叛居高而自忘則不憂下之離散愧其不若黄帝而哀不已若者慙其道之不及聖矜其民之不逮己故能無棄人也以徳分人謂之聖人化之使合道而不宰割也以財分人謂之賢人旣以與人已愈有也以賢臨人未有得人者也求備於人則物所不與也以賢下人者未有不得人者也與物升降者物必歸其於國有不聞也其於家有不見也道行則不煩聞見故曰不瞽不聾不能成功勿己則隰朋可郭象曰若有聞見則事鍾於己而羣下無所措其手足故遺之可也未能盡其道故僅之可也然則管夷吾非薄鮑叔也不得不薄非厚隰朋也不得不厚厚之於始或薄之於終薄之於終或厚之於始厚薄之去來弗由我也皆天理也鄧析析音錫鄧析著書二篇鄭人也與子産並時列子及孫卿並云子産殺鄧析㨿左傳昭公二十年子産卒定公九年駟顓殺鄧析而用其竹刑則非子産所殺也操七刀反兩可之說設無窮之辭當子産執政作竹刑竹刑簡法鄭國用之數難子産之治子産屈之子産執而戮之俄而誅之此傳云子産誅鄧析左傳云駟顓殺鄧析而用其竹刑子産卒後二十年而鄧析死也然則子産非能用竹刑不得不用鄧析非能屈子産不得不屈子産非能誅鄧析不得不誅也此義例與上章同也可以生而生或積徳履仁或遇時而通得當年之歡騁於一己之志似由報應若岀智力天福也自然生耳自然泰耳未必由仁徳與智力然交履信順之行得騁一己之志終年而無憂虞非天福如之何也可以死而死或積惡行暴或飢寒窮困故不顧刑戮不頼生存而威之而死似由身招若應事而至也天福也自然死耳自然窮耳未必由凶虐與愚弱然肆凶虐之心居不頼生之地而威之於死是之死得死者故亦曰天福者也可以生而不生居榮泰之地願獲長年而早終天罰也願生而不得生故曰天罰也可以死而不死居困辱之地不願生而更不死也天罰也輕死而不之死復是天罰可以生可以死得生得死有矣此之生而得生此之死而得死不可以生不可以死或死或生有矣此義之生而更死之死而更生者也此二句上義已該之而重岀疑書誤然而生生死死非物非我皆命也智之所無奈何生死之理旣不可測則死不由物生不在我豈智之所必故曰窈然無際天道自㑹漠然無分天道自運無際無分是自然之極自㑹自運豈有役之哉天地不能犯天地雖大不能違自然也聖智不能干聖神雖妙不能逆時運也鬼魅不能欺鬼魅雖妖不能詐其正也自然者默之成之默無也平之寜之平寜無所施為將之迎之功無遺䘮似若將迎楊朱之友曰季梁季梁得疾七日大漸漸也其子環而泣之請醫季梁謂楊朱曰吾子不肖如此之甚汝奚不為我歌以曉之楊朱歌曰天其弗識人胡能覺匪祐自天弗孽由人我乎汝乎其弗知乎醫乎巫乎其知之乎言唯我與汝識死生有命耳非醫巫所知也其子弗曉終謁三醫不解楊朱歌皆謂與己同也一曰矯氏二曰俞氏三曰盧氏診其所疾矯氏謂季梁曰汝寒温不節虚實失度病由飢飽色欲精慮煩散非天非鬼雖漸可攻也季梁曰衆醫也亟音棘屏上聲除也之俞氏曰女始則胎氣不足乳湩竹用反乳汁也有餘病非一朝一夕之故其所由來漸矣弗可已也季梁曰良醫也且食音嗣之盧氏曰汝疾不由天亦不由人亦不由鬼禀生受形旣有制之者矣亦有知之者矣夫死生之分修短之期咸定於無為天理之所制矣但愚昧者之所惑𤣥逹者之所悟也藥石其如汝何季梁曰神醫也重貺遣之俄而季梁之疾自瘳生非貴之所能存身非愛之所能厚生亦非賤之所能夭身亦非輕之所能薄故貴之或不生賤之或不死愛之亦不厚輕之或不薄此似反也非反也此自生自死自厚自薄或貴之而生或賤之而死或愛之而厚或輕之而薄此似順也非順也此亦自生自死自厚自薄鬻熊語文王鬻熊文王師也曰自長非所増自短非所損算之所亡音無若何算猶智也老耼語關尹曰天之所惡孰知其故王弼曰孰誰也言誰能知天意其唯聖人也言迎天意揣利害不如其已夫順天理而無心者則鬼神不能犯人事不能干若迎天意料倚伏處順以去逆就利而違害此方與逆害為巨對用智之精巧者耳未能使吉凶不生禍福兼盡也楊布楊朱弟也問曰有人於此年兄弟也言兄弟也才兄弟也貌兄弟也而壽夭父子也貴賤父子也名譽父子也愛憎父子也吾惑之楊子曰古之人有言吾嘗識之音志將以告若不知所以然而然命也自然之理故不可以智知今昏昏昧昧紛紛若若隨所爲隨所不爲日去日來孰能知其故皆命也夫信命者亡音無下同壽夭有壽夭則非命信理者亡是非有是非則非理信心者亡逆順有逆順則非心信性者亡安危有安危則非性則謂之都亡所信都亡所不信理亦無信與不信也眞矣慤矣奚去奚就奚哀奚樂奚為奚不為理茍無心則無所不為亦無所為也黃帝之書云至人居若死動若械此舉無心之極亦不知所以居亦不知所以不居亦不知所以動亦不知所以不動亦不以衆人之觀易其情貌亦不謂衆人之不觀不易其情貌不為外物視聽改其度也獨徃獨來獨岀獨入孰能礙之物徃亦徃物來亦來任物岀入故莫有礙墨尿音眉方言墨尿江淮之間謂之無頼廣雅云墨音目尿作欺自此二十人智巧才行兩兩相背而能相與和同終年者各任其眞性故也尿勑夷反單音戰至音咥嘽齒然反咺鄭𤣥注禮記云咺寛綽貌說文云咺寛閑心腹貌咺許爰反憋妨滅反懯音敷此皆詐輕發迂緩急速之貌四人相與游於世胥如如隨也謂各從其志志也窮年不相知情自以智之深也巧佞愚直婩魚略反斫音酌婩斫容止峭巘也字林云婩齊也斫齒略反便房連反辟婢亦反便僻恭敬大過也婩斫不解悟之貌四人相與游於世胥如志也窮年而不相語魚㩀反術自以巧之微也㺒苦交反㤉口家反阮孝緒云㤍㤉伏態貌㤍口交反情露無所隐蔽音蹇㥛音棘字林云極吃也方言吃也極急也謂語急而吃又云疾也急性相背也或作㥛極皆非也凌誶凌誶謂好陵辱責罵人也說文云誶責讓也字林音聚律反誶音碎此背反誶訥澀辯給之貌四人相與游於世胥如志也窮年不相曉悟自以爲才之得也眠莫典反娗音殄方言眡娗欺慢之語也郭璞云謂以言相輕弄也諈止累反諉如偽反鈍滯也爾雅云諈諉累去也郭璞云謂以事相屬累以諈諉也勇敢怯疑四人相與游於世胥如志也窮年不相讁發讁謂責其過也發謂攻其惡也自以行無戾也多偶謂多與人相和諧也廣雅云偶諧也自專謂自專擅不與衆同也乗權謂乗用權勢也立孤獨自立四人相與游於世胥如志也窮年不相顧自以時之適也此衆態也其貌不一而咸之於道命所歸也佹佹姑危反幾欲之貌成者俏音肖俏似也成也初非成也佹佹敗者俏敗者也初非敗也世有幾得㡬失之言而理實無㡬也故迷生於俏惑其似成敗而不能辯迷之所由也俏之際昧然於俏而不昧然際猶㑹也言冥昧難分耳則不駭外禍不喜内福禍福豈有内外皆理之𤣥定者也見其卒起因謂外至見其漸著因謂内成也隨時動隨時止智不能知也動止非我則非智所識也信命者於彼我無二心無喜懼之情也於彼我而有二心者不若揜目塞耳背坂靣隍亦不墜仆也此明用智計之不如任自然也故曰死生自命也若其非命則仁智者必壽凶愚者必夭而未必然也貧窮自時也若其非時則勤儉者必富而奢惰者必貧亦未必然怨夭折者不知命者也怨貧窮者不知時者也此皆不識自然之理當死不懼在窮不戚知命安時也其使多智之人量利害料虚實度人情得亦中陟冲反半也下同或陟仲反非也亡亦中中半也其少智之人不量利害不料虚實不度人情得亦中亡亦中量與不量料與不料度與不度奚以異唯亡所量不役智也亡所不量在智之所知也則全而亡音無䘮亦非知音智下知䘮同全亦非知䘮自全也自亡也自䘮也自全者非用心之所能自敗者非行失之所致也齊景公游於牛山今北海郡臨淄縣北臨其國城而流涕曰美哉國乎鬱鬱芊芊音千廣雅云芊芊盛之貌若何滴滴或作滂滂並皆歩邦反流蕩貌去此國而死乎使古無死者寡人將去斯而之何史孔梁丘據皆從而泣曰臣頼君之賜䟽食音嗣韓詩外傳全有此章云䟽食惡肉可得食䟽食菜食也惡肉可得而食駑馬稜當作棧晏子春秋及諸書皆作棧車謂編木為之棧士限反車可得而乗也且猶不欲死而况吾君乎晏子獨於旁公雪涕而顧晏子曰寡人今日之游悲孔與據皆從寡人而泣子之獨何也晏子對曰使賢者常守之則太公桓公將常守之矣使有勇者而常守之則莊公靈公將常守之矣數君者將守之吾君方將蓑笠而立乎畎畝之中唯事之恤行假念死乎行假當作何暇則吾君又安得此位而立焉以其迭處之迭去之至於君也而獨為之流涕是不仁也見不仁之君見謟䛕之臣臣見此二者臣之所為獨竊也景公慙焉舉觴自罰罰二臣者各二觴焉魏人有東門吳者其子死而不憂其相室曰公之愛子天下無有今子死不憂何也東門吳曰吾常無子無子之時不憂今子死乃與嚮無子同臣奚憂焉農赴時啇趣利工追術仕逐勢勢使然也然農有水旱商有得失工有成敗仕有遇否命使然也自然冥運也列子卷六
