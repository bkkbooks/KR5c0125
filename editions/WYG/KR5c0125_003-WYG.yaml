body:
  text: 列子卷三晉張湛注唐殷敬慎釋文周穆王第三夫禀生受有謂之形俛仰變異謂之化神之所交謂之夢形之所接謂之覺原其極也同歸虚偽何者生質根滯百年乃終化情枝淺視瞬而滅神道恍惚若存若亡形理顯著若誠若實故洞鑒知生滅之理均覺夢之塗一雖萬變交陳未闗神慮愚惑者以顯昧為成驗遲速而致疑故竊然而自私以形骸為真宅孰識生化之本歸之於無物哉周穆王名滿昭王子也時西極之國有化人來化幻人也入水火貫金石反山川移城邑乗虚不墜觸實不硋硋音礙千變萬化不可窮極既已變物之形又且易人之慮能使人暫忘其宿所知識穆王敬之若神事之若君推路寢以居之引三牲以進之選女樂以娯之化人以為王之宫室卑陋而不可處王之厨饌腥螻而不可饗螻蛄也王之嬪御膻惡而不可親穆王乃為之改築土木之功赭赭音者赤色堊音惡白土也之色無遺巧焉五府周禮太府掌九貢九職之貨賄玉府掌金玉玩好内府主良貨賄外府主泉藏膳府主四時食物者也為虚而臺始成其髙千仞臨終南山名在京兆之上號曰中天之臺簡鄭衛之處子娥媌媌音茅靡曼者娥媌妖好也靡曼柔弱也施芳澤正蛾眉設笄珥珥音餌瑱也冕上垂玉以塞耳笄首飾珥瑱也衣於既反阿錫阿細縠錫細布曵曵音裔齊紈齊名紈所出也粉白黛黑珮玉環雜芷若芷若香草以滿之充滿臺館奏承雲六瑩九韶晨露以樂之承雲黄帝樂六瑩帝嚳樂九韶舜樂晨露湯樂日月獻玉衣旦旦薦玉食言其珍異化人猶不然不得已而臨之居亡㡬何謁王同㳺王執化人之袪音墟袪衣袖也騰而上者中天廼止暨及化人之宫化人之宫構以金銀絡以珠玉出雲雨之上而不知下之據望之若屯雲焉耳目所觀聽鼻口所納甞皆非人間之有王實以為清都紫㣲鈞天廣樂帝之所居清都紫㣲天帝之所居也傳記云秦穆公疾不知人既寤曰我之帝所甚樂與百神游鈞天廣樂九奏萬舞不𩔖三代之樂其聲動心一説云趙簡子亦然也王俯而視之其宫榭若累塊積蘓樵也焉王自以居數十年不思其國也所謂易人之慮也化人復謁王同㳺所及之處仰不見日月俯不見河海光影所照王目眩不能得視音響所來王耳亂不能得聽百骸六藏悸而不凝意迷精喪請化人求還太虚恍惚之域固非俗人之所渉心目亂惑自然之數也化人移之移猶推也王若磒虚焉磒墜也既寤所坐猶嚮者之處侍御猶嚮者之人視其前則酒未清肴未昲扶貴反王問所從來左右曰王黙存耳由此穆王自失者三月而復更問化人問其形不移之意化人曰吾與王神㳺也形奚動哉所謂神者不疾而速不行而至以近事喻之假寐一昔所夢或百年之事所見或絶域之物其在覺也俛仰之須臾再撫六合之外邪想淫念猶得如此況神心獨運不假形器圓通𤣥照寂然凝虚者乎且曩之所居奚異王之宫曩之所㳺奚異王之圃王閒閒音閑恒謂習其常存也一本無此字疑蹔亡彼之與此俱非真物習其常存疑其蹔亡者心之惑也變化之極徐疾之間可盡模哉變化不可窮極徐疾理亦無間欲以智尋象模未可測王大悦不恤國事不樂臣妾感至言故遺世事之治亂忘君臣之尊卑也肆意逺㳺命駕八駿之乗右服古驊字騮而左緑耳右驂赤而左白史記曰造父為穆王得驊騮赤白犧之馬御以遊巡徃見西王母樂而忘歸與穆天子傳畧同郭璞注云皆毛色以為名也後有渠黃踰輪盜驪山子為八駿古犧字主車則造父為御音㤗篆作音丙石經作字林云𨼆作西上齊下合此古字未審為右淮南子云鉗且泰丙之御也除轡銜棄鞭䇿髙誘云皆古之得道善御也鉗其炎反且子余反次車之乗右服渠黃而左踰輪左驂盜驪驪力移反盜驪即荀子之纎離者也而右山子柏夭郭璞云柏夭人姓名主車參百為御奔戎為右馳驅千里至于巨蒐搜西戎國名氏之國巨蒐氏乃獻白鵠之血以飲王具牛馬之湩竹用反以洗王之足湩乳也以已所珍貴獻之至尊及二乗實證反之人已飲而行遂宿于崑崙崑崙音昆論之阿赤水之陽山海經曰流沙之濵赤水之後黑水之前有大山名崑崙之丘有人宂處名曰西王母山海經云崑崙山有五色水也别日升崑崙之丘以觀黃帝之宫陸賈新語云黄帝巡㳺四海登崑崙山起宫望於其上而封之以詒後世遂賔于西王母河圖玉版云西王母居崑崙山紀年云穆王十七年西征見西王母賔于昭宫觴于瑶池之上西王母人𩔖也虎齒蓬髪戴勝善嘯也出山海經西王母為王謡徒歌曰謡詩名白雲王和之和答也詩名東歸其辭哀焉廼觀日之所入穆天子傳云西登弇山一日行萬里王乃歎曰於乎於乎音嗚呼又作乎予一人不盈于德而諧於樂諧辨後世其追數色句反責也吾過乎自此已上至命駕八駿之乗事見穆天子傳穆王㡬㡬音豈神人哉言非神也能窮當身之樂猶百年乃徂知世事無常故肆其心也世以為登假假音遐焉假字當作遐世以為登遐明其實死也老成子學幻於尹文先生三年不告老成子請其過而求退尹文先生揖而進之於室屏必郢反左右而與之言曰昔老耼之徂西也顧而告予曰有生之氣有形之狀盡幻也造化之所始隂陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻窮二儀之數握隂陽之紀者陶運萬形不覺其幻也造物者其巧妙其功深固難窮難終造物者豈有心哉自然似妙耳夫氣質憤薄結而成形隨化而徃故未即消滅也因形者其巧顯其功淺故隨起隨滅假物而為變革者與成形而推移故暫生暫没功顯事著故物皆駭知幻化之不異生死也始可與學幻矣注篇目已詳其義吾與汝亦幻也奚須學哉身則是幻而復欲學幻則是幻幻相學也老成子歸用尹文先生之言深思三月遂能存亡自在憣校音絞顧野王讀作翻交四時四時冬起雷夏造氷飛者走走者飛深思一時猶得其道況不思而自得者乎夫生必由理形必由生未有有生而無理有形而無生生之與形形之與理雖精麄不同而迭為賔主徃復流遷未始蹔停是以變動不居或聚或散撫之有倫則功潜而事著脩之失度則跡顯而變彰今四時之令或乖則三辰錯序雷氷反用器物蒸爍則飛鍊雲沙以成氷頃得之於常衆所不疑推此𩔖也盡隂陽之妙數極萬物之情者則陶鑄羣有與造化同功矣若夫偏達數術以氣質相引俛仰則一出一没顧眄則飛走易形蓋術之末者也終身不著其術故世莫傳焉日用而百姓不知聖人之道也顯竒以駭一世常人之事耳子列子曰善為化者其道密庸其功同人取濟世安物而已故其功潜著而人莫知焉五帝之德三王之功未必盡智勇之力或由化而成孰測之哉帝王之功德世為之名非所以為帝王也揖讓干戈果是所假之塗亦奚為而不假幻化哉但駭世之迹聖人密用而不顯焉覺覺音教有八徵夢有六候徵驗也候占也六夢之占義見周官奚謂八徵一曰故故事二曰為為作也三曰得四曰喪五曰哀六曰樂七曰生八曰死此八徴者形所接也奚謂六候一曰正夢平居自夢二曰蘁蘁音愕夢周官注云蘁當為驚愕之愕謂驚愕而夢三曰思夢因思念而夢四曰寤夢覺時道之而夢五曰喜夢因喜悦而夢六曰懼夢因恐怖而夢此六者神所交也此一章大㫖亦明覺夢不異者也不識感變之所起者事至則惑其所由然識感變之所起者事至則知其所由然知其所由然則無所怛怛下達反夫變化云為皆有因而然事以未來而不尋其本者莫不致惑言識所由雖譎怪萬端而心無所駭也一體之盈虚消息皆通於天地應於物𩔖人與隂陽通氣身與天地並形吉㐫徃復不得不相關通也故隂氣壯則夢涉大水而恐懼失其中和則濡溺恐懼也陽氣壯則夢涉大火而燔焫焫如悦反火性猛烈遇則燔焫也隂陽俱壯則夢生殺隂陽以和為用者也抗則自相利害故或生或殺也甚飽則夢與甚飢則夢取有餘故欲施不足故欲取此亦與覺相𩔖也是以以浮虚為疾者則夢揚以沈實為疾者則夢溺藉帶而寢則夢蛇飛鳥銜髮則夢飛此以物𩔖致感將隂夢火將疾夢食飲酒者憂歌儛者哭此皆明夢或因事致感或造極相反即周禮六夢六義理無妄然子列子曰神遇為夢形接為事莊子曰其寐也神交其覺也形開故晝想夜夢神形所遇此想謂覺時有情慮之事非如世間常語晝日想有此事而後隨而夢也故神凝者想夢自消晝無情念夜無夢寐信覺不語信夢不達物化之徃來者也夢為鳥而厲於天夢為魚而潜於淵此情化徃復也古之真人其覺自其寢不夢㡬㡬音豈虚語哉真人無徃不乃當不眠何夢之有此亦寓言以明怪也西極之南隅有國焉不知境界之所接名古莽之國隂陽之氣所不交故寒暑亡亡音無下同辨日月之光所不照故晝夜亡辨其民不食不衣而多眠五旬一覺以夢中所為者實覺之所見者妄四海之齊謂中央之國即今四海之内跨河南北越岱東西萬有餘里其隂陽之審度故一寒一暑昏明之分察故一晝一夜其民有智有愚萬物滋殖才藝多方有君臣相臨禮法相持其所云為不可稱計一覺一寐以為覺之所為者實夢之所見者妄東極之北隅有國曰阜阜音婦落之國其土氣常燠燠音郁日月餘光之照其土不生嘉苖其民食草根木實不知火食性剛悍彊弱相藉藉音陵貴勝而不尚義多馳步少休息常覺而不眠方俗之異猶覺夢反用動寢殊性各適一方未足相非者也周之尹氏大治治音持産其下音走下同役者侵晨昏而弗息有老役夫筋力竭矣而使之彌勤晝則呻呼呻呼音申吟下同而即事夜則昏憊而熟寐精神荒散昔昔夜夜也夢為國君居人民之上總一國之事遊燕宫觀恣意所欲其樂無比覺則復役人有慰喻其懃者役夫曰人生百年晝夜各分分丰也吾晝為僕虜苦則苦矣夜為人君其樂無比何所怨哉尹氏心營世事慮鍾家業心形俱疲夜亦昏憊而寐昔昔夢為人僕趨走作役無不為也數罵杖撻無不至也眠中啽吾南反囈藝音詣啽囈呻吟並寐語也呻吟徹旦息焉尹氏病之以訪其友友曰若位足榮身資財有餘勝人逺矣夜夢為僕苦逸之復數之常也夫盛衰相襲樂極哀生故覺之所美夢或惡之若欲覺夢兼之豈可得邪尹氏聞其友言寛其役夫之程減已思慮之事疾並少間病差也此章亦明覺夢不異苦樂各適一方則役夫懃於晝而逸於夜尹氏榮於晝而辱於夜理茍不兼未足相跨也鄭人有薪於野者遇駭鹿御御音訝迎也而擊之斃之恐人見之也遽而藏諸隍無水池中覆之以蕉與樵同不勝其喜俄而遺其所藏之處遂以為夢焉順塗而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今得之彼直真夢者矣室人曰若將是夢見薪者之得鹿邪詎有薪者邪今真得鹿是若之夢真邪夫曰吾據得鹿何用知彼夢我夢邪薪者之歸不厭厭音惬又於艶反失鹿其夜真夢藏之之處又夢得之之主爽旦案所夢而尋得之遂訟而爭之歸之士師掌五禁之法者士師曰若初真得鹿妄謂之夢真夢得鹿妄謂之實彼真取若鹿而與若爭鹿室人又謂夢認人鹿無人得鹿今據有此鹿請二分之以聞鄭君鄭君曰嘻士師將復夢分人鹿乎訪之國相國相曰夢與不夢臣所不能辨也欲辨覺夢唯黃帝孔丘聖人之辨覺夢何邪直知其不異耳今亡亡音無黃帝孔丘孰辨之哉且恂士師之言可也恂信也音荀因喜怒而迷惑猶不復辨覺夢之虚實況本無覺夢也宋陽里華胡化反子中年病忘忘音望朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐今不識先後不識今闔室毒之謁史而卜之弗占謁巫而禱之弗禁謁醫而攻之弗已魯有儒生自媒能治之華子之妻子以居産之半請其方儒生曰此固非卦兆之所占夫機理萌於彼蓍龜感於此故吉㐫可因卦兆而推情慝可假象數而尋今忘者之心泊爾釣於死灰廓焉同乎府宅聖人將無所容其鑒豈卦兆之所占非祈請之所禱夫信順之可以祈福慶正誠之可以消邪偽自然之勢也故負愧於神明致怨於人理者莫不因兹以自極至於情無專惑行無狂僻則非祈請之所禱也非藥石之所攻疼痾結於府藏疾病散於肌體者必假脉診以察其盈虚投藥石以攻其所苦若心非嗜慾所亂病非寒暑所傷則醫師之用宜其廢也吾試化其心變其慮庶幾其瘳乎夫忘者都無心慮將何所化此義自云易令有心反令有慮蓋亂有左右耳於是試露之而求衣飢之而求食幽之而求明先奪其攻已之物以試之儒生欣然告其子曰疾可已也然吾之方密傳世不以告人試屏左右獨與居室七日從之莫知其所施為也儒者之多方固非一塗所驗也而積年之疾一朝都除上句云使巫醫術之所絶思而儒生獨能已其所病者先引華子之忘同於自然以明無心之極非數術而得復推儒生之功有過史巫者明理不冥足則可以多方相誘又欲令忘者之悟知曩之忘懷實㡬乎至理也華子既悟廼大怒黜妻罰子操戈逐儒生宋人執而問其以華子曰曩吾忘也蕩蕩然不覺天地之有無今頓識既徃數十年來存亡得失哀樂好惡擾擾萬緒起矣吾恐將來之存亡得失哀樂好惡之亂吾心如此也須臾之忘可復得乎疾病與至理相似者猶能若斯況體極乎子貢聞而怪之以告孔子孔子曰此非汝所及乎顧謂顔回紀之此理亦當是賜之所逮所以抑之者欲寄妙賞於大賢耳秦人逄逄音龐氏有子少而恵及壯而有迷罔之疾惠非迷也而用惠之弊必之於迷焉聞歌以為哭視白以為黒饗香以為朽月令曰其朽甞甘以為苦行非以為是意之所之天地四方水火寒暑無不倒錯者焉楊氏告其父曰魯之君子多術藝將能已乎汝奚不訪焉其父之魯過陳遇老耼因告其子之證老聃曰汝庸知汝子之迷乎今天下之人皆惑於是非昏於利害同疾者多固莫有覺者且一身之迷不足傾一家一家之迷不足傾一鄉一鄉之迷不足傾一國一國之迷不足傾天下天下盡迷孰傾之哉向使天下之人其心盡如汝子汝則反迷矣哀樂聲色臭味是非孰能正之且吾之言未必非迷而況魯之君子迷之郵者魯之君子盛稱仁義明言是非故曰迷之郵者也焉能解人之迷哉榮汝之糧不若遄歸也榮棄也此章明是非之理未可全定皆衆寡相傾以成辨爭也燕人生於燕長張文反於楚及老而還本國過晉國同行者誑之指城曰此燕國之城其人愀七小反然變容指社曰此若里之社乃喟然而歎指曰此若先人之廬乃㳙㳙音泫胡犬胡絹二反然而泣指壠曰此若先人之冢其人哭不自禁禁音金同行者啞烏陌反然大笑曰予昔紿紿音待欺也若此晉國耳其人大慙及至燕真見燕國之城社真見先人之廬冢悲心更微少也作徹者誤此章明情有一至哀樂既過則向之所感皆無欣戚者也列子卷三
