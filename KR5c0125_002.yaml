body:
  text: 列子卷二晉張湛注唐殷敬慎釋文黃帝第二禀生之質謂之性得性之極謂之和故應理處順則所適常通任情背道則遇物斯滯黃帝即位十有五年喜天下戴已隨世而喜耳養正命正當為性娯耳目供鼻口燋音焦然肌本又作顔色色皯古旱反黣音每諸書無此字昏然五情爽惑役心智未足以養性命秪足以焦形也又十有五年憂天下之不治隨世而憂耳竭聰明進音盡智力營百姓焦然肌色皯黣昏然五情爽惑用德明未足以致治秪足以亂神也黃帝乃喟然讃曰讃當作歎朕之過淫矣淫當作深養一已其患如此治萬物其患如此惟任而不養縱而不治則性命自全天下自安也於是放萬機音捨宫寢去直侍徹鐘懸減厨膳退而間音閒居大庭之館齋心服形心無欲則形自服矣三月不親政事晝寢而夢將明至理不可以情求故寄之於夢聖人無夢也遊於華胥氏之國華胥氏之國在弇音奄州之西台州之北不必便有此國也明至理之必如此耳淮南云正西曰弇州西北曰台州不知斯齊國幾居豈反千萬里斯離也齊中也蓋非舟車足力之所及神㳺而已舟車足力形之所資者耳神道恍惚不行而至者也其國無帥所𩔖反長丁丈反帥長首主也自然而已其民無嗜欲自然而已自然者不資於外也不知樂生不知惡死故無夭殤不知親已不知踈物故無愛憎不知背音佩逆不知向順故無利害理無生死故無所樂惡理無愛憎故無所親踈理無逆順故無所利害也都無所愛惜都無所畏忌入水不溺入火不熱斫撻斫音酌撻打也無傷痛指擿音倜搔也無痟癢餘兩反痟癢謂疼癢也周禮春時有痟首疾夏時有癢疥疾鄭𤣥云痟酸削也説文云痟疼痛也至和者無物能傷熱溺痛癢實由矜懼義例詳於下章痟癢酸痟也義見周官乗空如履實寢虚若處牀雲霧不硋五蓋反其視雷霆不亂其聽美惡不滑音骨其心山谷不躓音致其步神行而已至順者無物能逆也黃帝既寤亦寄之眠寤耳聖人無眠覺也悟然自得召天老力牧太山稽音鷄漢書云太山稽黄帝師也三人黄帝相也告之曰朕閒居三月齋心服形思有以養身治物之道弗獲其術身不可養物不可治而精思求之未可得疲而睡所夢若此今知至道不可以情求矣朕知之矣朕得之矣而不能以告若矣不可以情求則不能以情告矣又二十有八年天下大治幾若華胥氏之國而帝登假假當作遐百姓號户刀反之二百餘年不輟列姑射射音夜山在海河洲中見山海經山上有神人焉凝寂故稱神人吸風飲露不食五榖既不食穀矣豈復須吸風飲露哉蓋吐納之貎不異於物耳心如淵上字讀為深泉行如處女盡柔虚之極者其天姿自粹非養而不衰也不偎烏恢反愛也不愛不偎不愛謂或隱或見山海經曰北海之隅其人水居偎愛隱偎也字林云偎仿佛見不審也偎亦愛也芻狗萬物恩無所偏偎音隱偎仙聖為之臣仙夀考之跡聖治世之名不畏不怒愿慤為之使畏威也若此豈有君臣役使之哉尊卑長短各當其分因此而寄稱耳不施不惠而物自足不聚不斂而已無愆愆本又作蹇去言反愆蹇之也隂陽常調日月常明四時常若若順也風雨常均字育常時年穀常豐而土無札傷人無夭惡物無疵厲鬼無靈響焉天人合德隂陽順序昏明有度災害不生故道合二儀契均四時老子曰以道位天下者其鬼不神列子師老商氏友伯髙子進二子之道乗風而歸莊子云列子御風而行泠然善旬五日而後反蓋神人禦冦稱之也尹生聞之從列子居數月不省息井反因間間音閑請蘄其術者十反而十不告尹生懟音墜怨也而請辭列子又不命尹生退數月意不已又徃從之列子曰汝何去來之頻尹生曰曩章載章載字載則一本作章戴有請於子章戴尹生名子不我告固有憾於子今復脱然是以又來列子曰曩吾以汝為達曩昔也今汝之鄙至此乎姬音居將告汝姬居也所學於夫子者矣自吾之事夫子友若人也夫子謂老商若人謂髙伯三年之後心不敢念是非口不敢言利害始得夫子一眄而已實懷利害而不敢言此匿怨藏情者也故眄之而已五年之後心庚念是非口庚言利害庚當作更夫子始一解顔而笑是非利害世間之常理任心之所念任口之所言而無矜吝於胷懹内外如一不猶踰於已而不顯哉欣其一致聊寄笑馬七年之後從音縱下同心之所念庚無是非從口之所言庚無利害夫子始一引吾並席而坐夫心者何寂然而無意想也口者何黙然而自吐納也若順心之極則無是非任口之理則無利害道契師友同位比肩故其宜耳九年之後横去聲下同縱放也心之所念横口之所言亦不知我之是非利害歟亦不知彼之是非利害歟亦不知夫子之為我師若人之為我友内外進矣心既無念口既無違故能恣其所念縱其所言體道窮宗為世津梁終日念而非我念終日言而非我言若以無念為念無言為言未造於極也所謂無為而無不為者如斯則彼此之異於何而求師資之義將何所施故曰内外盡矣而後眼如耳耳如鼻鼻如口無不同也心凝形釋骨肉都融不覺形之所倚足之所履隨風東西猶木葉幹音乾殻竟不知風乗我邪我乗風乎夫眼耳鼻口各有攸司令神凝形廢無待於外則視聽不資眼耳味不賴鼻口故六藏七孔四肢百節塊然尸居同為一物則形奚所倚足奚所履我之乗風風之乗我孰能辨也今女居先生之門曾未浹時而懟憾者再三女之片體將氣所不受汝之一節將地所不載用其情有其身則肌骨不能相容一體將無所寄豈二儀之所能覆載履虚乗風其可幾音兾乎尹生甚怍屏息良久不敢復言列子問關尹關令尹喜字公度著書九篇曰至人潜行不空一本作窒塞也不空者實有也至人動止不以實有為閡者也郭象曰其心虚故能御羣實也蹈火不熱行乎萬物之上而不慄向秀曰天下樂推而不猒非吾之自髙故不慄者也請問何以至於此關尹曰是純氣之守也非智巧果敢之列列音例至純至真即我之性分非求之於外順而不失則物所不能害豈智計勇敢而得冐涉艱危也姬姬音居魚語魚當作吾語魚據反女音汝凡有貎像聲色者皆物也上至聖人下及昆蟲皆形聲之物以形聲相觀則無殊絶者也物與物何以相逺于萬反也向秀曰唯無心者獨逺耳夫奚足以至乎先是色而已向秀曰同是形色之物耳未足以相先也以相先者唯自然也則物之造音作臧作反注同乎不形而止乎無所化有既無始則所造者無形矣形既無終則所止者無化矣造音作夫得是而窮之者焉於䖍反得為正焉尋形聲欲窮其終始者亦焉得至極之所乎彼將處乎不深之度即形色而不求其終始者不失自然之正矣深當作淫而藏乎無端之紀至理豈有隱藏哉任而不執故冥然無迹端崖不見㳺乎萬物之所終始乗理而無心者則常與萬物並逰豈得無終始之迹者乎壹其性養其氣一本作真其氣含其德以通乎物之所造造至也氣壹德純者豈但自通而已哉物之所至皆使無閡然後通濟羣生焉造音操夫若是者其天守全其神無郤郤音閑也物奚自入焉自然之分不虧則形神全一憂患奚由而入也夫醉者之墜於車也雖疾不死骨節與人同而犯害與人異其神全也乗食陵反亦弗知也墜亦弗知也此借麤以明至理之必然也死生驚懼不入乎其胷是故逆音忤遇也一本作遌心不欲見而見曰遌於義頗迂莊子亦作遌物而不慴慴之涉反向秀曰遇而不恐也彼得全於酒而猶若是向秀曰醉故失其所知耳非自然無心也而況得全於天乎向秀曰得全於天者自然無心委順至理也聖人藏於天故物莫之能傷也郭象曰不闚性分之外故曰藏也列禦冦為于偽反伯昏無莫侯反下並同人射引之盈貫盡弦窮鏑措杯必回反水其肘上手停審故杯水不傾發之鏑矢復沓郭象曰矢去也箭鏑去復徃沓方矢復寓郭象曰箭方去未至的以復寄杯於肘言敏捷之妙也當是時也猶象木偶人形曰象人人也伯昏無人曰是射之射雖盡射之理而不能不以矜物也非不射之射也忘其能否雖不射而同乎射也當與汝登高山履危石臨百仞之淵若能射乎内有所畏懼則失其射矣於是無人遂登髙山履危石臨百仞之淵背逡巡足二分垂謂足二分懸垂在外在外揖禦冦而進之禦冦伏地汗流至踵伯昏無人曰夫至人者上闚青天下潜黄泉揮斥郭象曰揮斥猶放縱也又曰揮斥奮迅也八極神氣不變夫德充於内則神滿於外無逺近幽深所在皆明故審安危之機而泊然自得也今汝怵丑律反然有恂何承天纂云呉人呼瞬目為恂目目之志爾於中丁仲反也殆矣夫郭象曰不能明至分故有懼而所喪者多矣豈唯射乎范氏有子曰子華善養私名遊俠之徒也舉國服之有寵於晉君不仕而居三卿之右目所偏視晉國爵之口所偏肥音皮美反按説文字林並作又作圯皆毁也字從其省音鄙肥薄也晉國黜之㳺其庭者侔於朝子華使其俠客以智鄙相攻彊弱相凌雖傷破於前不用介意介界副也稱也終日夜以此為戲樂國殆成俗禾生子伯范氏之上客出行經坰外坰郊野之外也宿於田更商丘開之更當作叟中夜禾生子伯二人相與言子華之名勢能使存者亡亡者存富者貧貧者富商丘開先悉薦反窘竒隕反困也於饑寒潜於牗北聽之因假糧荷胡可反畚音本蕢籠也之子華之門子華之門徒皆世族也縞衣乗軒緩步闊苦括反逺也廣也視顧見商丘開年老力弱面目黎黒衣冦不檢莫不眲之眲奴革反方言云楊越之間凡人相輕侮以為無知謂之眲眲耳目不相信也既而狎侮欺紿音代方言相欺亦曰紿攩攩胡廣反方言今江東人亦名推為攩又音晃搥打也㧙㧙蒲結反方言凡相推搏曰㧙又扶畢反推擊也挨烏駭反推也抌抌丁感反方言擊背也一本作抗違拒也攩音晃㧙音扶閉挨音烏待抌音都感切亡亡音無所不為商丘開常無愠容而諸客之技單單音丹盡也憊蒲介反疲也於戲笑遂與商丘開俱乗髙臺於衆中漫莫汗反散也言曰有能自投下者賞百金衆皆競應商丘開以為信然遂先投下形若飛鳥一本作飛鳬揚餘亮反猶颺物從風也於地音肌骨無䃣音毁范氏之黨以為偶然未詎怪也因復扶又反指河曲之淫音深隈烏恢反水曲也一本作偶曰彼中有寳珠泳音詠潜行水中也可得也商丘開復從而泳之水底潜行曰泳既出果得珠焉衆昉昉分兩反或云昉始也同疑子華昉令豫肉食衣帛之次俄而范氏之藏大火子華曰若能入火取錦者從所得多少賞若商丘開往無難色入火往還埃不漫身不焦范氏之黨以為有道乃共謝之曰吾不知子之有道而誕子誕欺也吾不知子之神人而辱子子其愚我也子其聾我也子其盲我也敢問其道商丘開曰吾亡亡音無道雖吾之心亦不知所以雖然有一於此試與子言之曩子二客之宿吾也聞譽范氏之勢能使存者亡亡者存富者貧貧者富吾誠之無二心故不逺而來及來以子黨之言皆實也唯恐誠之之不至行之之不及不知形體之所措利害之所存也心一而已物亡迕者如斯而已今昉知子黨之誕我我内藏猜慮外矜觀聽追幸昔日之不焦溺也怛然内熱惕然震悸矣水火豈復可近哉自此之後范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝弗知乎夫至信之人可以感物也動天地感鬼神横六合而無逆者豈但履危險入水火而已哉商丘開信偽物猶不逆況彼我皆誠哉小子識之周宣王之牧正養禽獸之長也有役人梁鴦者能養野禽獸委於偽反食音嗣下食虎同於園庭之内雖虎狼鵰鶚之𩔖無不柔馴者雄雌在前孳音兹又音字乳化曰孳交接曰尾尾孳尾牡牝相生也成羣異𩔖雜居不相搏噬音博逝也王慮其術終於其身令毛丘園一本作圉魚吕反姓毛名邱園傳之梁鴦曰鴦賤役也何術以告爾懼王之謂隱於爾也且一言我養虎之法凡順之則喜逆之則怒此有血氣者之性也然喜怒豈妄發哉皆逆之所犯也夫食虎者不敢以生物與之為于偽反其殺之之怒也恐因殺以致怒不敢以全物與之為其碎一本作决之之之怒也恐因其用力致怒時其饑飽達其怒心向秀曰達其心之所以怒而順之也虎之與人異𩔖而媚養已者順也殊性而愛媚我順之故也故其殺之逆也所以害物逆其心故然則吾豈敢逆之使怒哉亦不順之使喜也夫喜之復也必怒怒之復也常喜皆不中也不處中和勢極則反必然之數今吾心無逆順者也則鳥獸之視吾猶其儕也故㳺吾園者不思髙林曠澤寢吾庭者不願深山幽谷理使然也聖人所以陶運羣生使各得其性亦猶役人之能將養禽獸使不相殘害也顔回問乎仲尼曰吾嘗濟乎觴深之淵矣津人操七刀反下同舟若神吾問焉曰操舟可學邪曰可能㳺浮水曰㳺者可教也善㳺者數色據反術也注同能向秀曰其數自能也言其道數必能不懼舟也乃若夫没人則未嘗見舟而謖所六反莊子作便操之者也謖起也向秀曰能鶩没之人也吾問焉而不告敢問何謂也仲尼曰音衣與譩同歎聲也吾與若玩五貫反習也其文也久矣而未達其實而固且道與音余見操舟之可學則是玩其文未悟没者之自能則是未至其實今且為汝説之也能遊者可教也輕水也善㳺者之數能也忘水也忘水則無矜畏之心乃若夫没人之未嘗見舟也而謖操之也彼視淵若陵視舟之覆猶其車却也覆却萬物方陳乎前而不得入其神明所居故謂之舍惡音烏徃而不暇所遇皆閒暇也以瓦摳摳探也以手藏物探而取之亦曰藏彄風土記云臘日飲祭之後叟嫗兒童為藏彄之戯辛氏三秦記云漢鉤弋夫人手拳時人傚之因名為藏鉤也彄曰侯反莊子作摳者巧以鉤銀銅為之摳者憚待汗反以黄金摳者惛惛音昏方言迷殙也互有所投者摳郭象曰所要愈重則其心愈矜也巧一也而有所矜則重外也凡重外者拱本作拙内唯忘内外遺輕重則無巧拙矣孔子觀於吕梁在今彭城郡爾雅曰石絶水曰梁懸水三十仞流沬三十里黿鼉魚鼈之所不能㳺也見一丈夫游之以為有苦而欲死者也使弟子並流而承音拯方言出溺為承諸家直作拯又作撜之數百步而出被髮行歌而游於棠行棠當作塘行當作下孔子從而問之曰吕梁懸水三十仞流沬三十里黿鼉魚鼈所不能游向吾見子道之道當作蹈以為有苦而欲死者使弟子並流將承音拯子子出而被髮行歌吾以子為鬼也察子則人也請問蹈水有道乎曰亡音無本無此亡字吾無道吾始乎故長乎性成乎命與齎俱入與汨古忽反涌波也郭象云洄伏而涌出者汨也偕出齎汨者水迴入涌出之貎從水之道而不為私焉此吾所以道之也孔子曰何謂始乎故長乎性成乎命也曰吾生於陵而安於陵故也故猶素也任其真素則所遇而安也長於水而安於水性也順性之理則物莫之逆也不知吾所以然而然命也自然之理不可以智知知其不可知謂之命也仲尼適楚出於林中見痀於禹反僂音縷痀僂背曲疾也者承蜩音條一本作蜩蟬也猶掇都括反拾也之也仲尼曰子巧乎有道邪曰我有道也五六月纍占累反垸音丸司馬云謂累丸於竿頭也二而不墜則失者錙銖音淄殊向秀曰累二丸而不墜是用手之停審也故承蜩所失者不過錙銖之間耳纍三而不墜則失者十一纍五而不墜猶掇之也用手轉審則無所失者也吾處也若橜株駒橜本或作撅同其月反説文作身木也李頥云橜竪也株駒亦枯樹本也駒音俱崔譔曰橜株駒斷樹也吾執臂若槁空好反木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得郭象曰遺彼故得此也孔子顧謂弟子曰用志不分乃凝於神分猶散意專則與神相似者也其痀僂丈人之謂乎丈人曰汝逢衣禮記儒行篇曰邱少居魯衣逢掖之衣長居宋冠章甫之冠鄭𤣥注云逢猶大也謂大掖之衣向秀曰儒服寛而長大徒也亦何知問是乎脩汝所以而後載言其上脩治也言治汝所用仁義之術反於自然之道然後可載此言於身上也海上之人有好呼報反漚音鷗鳥者每旦之海上從漚鳥游漚鳥之至者百住音數而不止心和而形順者物所不惡住當作數其父曰吾聞漚鳥皆從汝㳺汝取來吾玩之明日之海上漚鳥舞而不下也心動於内形變於外禽鳥猶覺人理豈可詐哉故曰至言去丘吕反言至為無為齊在詣反智之所知則淺矣言為都忘然後物無疑心限於智之所知則失之逺矣或有疑丈人假偽形以獲蟬海童任和心而鷗㳺二情相背而同不忤物夫立言之本各有攸似若乖互㑹歸不異者蓋丈人明夫心慮專一猶能外不駭物況自然冥至形同於木石者乎至於海童誠心充於内坦蕩形於外雖未能利害兩忘猜忌兼消然輕羣異𩔖亦無所多怪此二喻者蓋假近以徵逺借末以明本耳趙襄子率所律反徒十萬狩於中山火畋曰狩藉在夜反芿芿而誫反在下曰藉草不剪曰芿燔燔音煩燒也林扇赫百里有一人從石壁中出隨煙燼疾刄反上時掌反下衆謂鬼物火過徐行而出若無所經涉者襄子怪而留力救反謂宿留而視之之徐而察之形色七竅人也氣息音聲人也問奚道而處石奚道而入火其人曰奚物而謂石奚物而謂火此則都不覺有石火何物而能閡之襄子曰而嚮之所出者石也而嚮之所涉者火也其人曰不知也不知之極故得如此魏文侯聞之問子夏曰彼何人哉子夏曰以商所聞夫子之言和者大同於物物無得傷閡者㳺金石蹈水火皆可也文侯曰吾子奚不為之子夏曰刳刳音枯心去智商未之能雖然試語之有暇矣夫因心以刳心借智以去智心智之累誠盡然所遣心智之跡猶存明夫至理非用心之所體忘言之則有餘暇矣文侯曰夫子奚不為之子夏曰夫子能之而能不為者也文侯大説説音悦天下有能之而能不為者有能之而不能不為者有不能而彊欲為之者有不為而自能者至於聖人亦何所為亦何所不為亦何所能亦何所不能俛仰同俗升降隨物竒功異迹未嘗蹔顯體中之絶妙處萬不視一焉此卷自始篇至此章明順性命之道而不係著五情專氣致柔誠心無二者則處水火而不燋溺涉木石而不悸駭觸鋒刄而無傷殘履危險而無巔墜萬物靡逆其心入獸不亂群神能獨㳺身能輕舉耳可洞聽目可徹照斯言不經實駭常心故試論之夫隂陽化五才偏育金土以母子相生水火以燥濕相乗人性以静躁殊途升降以所能異情故有雲飛之翰潜之鱗火遊之䑕木藏之蟲何者剛柔炎涼各有攸宜安於一域則困於餘方至於聖人心與元氣𤣥合體與隂陽冥諧方圓不當於一象温涼不值於一器神定氣和所乗皆順則五物不能逆寒暑不能傷謂含德之厚和之至也故常無死地豈用心去就而復全哉蹈水火乗雲霧履髙危入甲兵未足怪也有神巫男曰覡女曰巫顔師古曰巫覡亦通稱自齊來處於鄭命曰季咸知人死生存亡禍福夀夭期以嵗月旬日如神鄭人見之皆避一本作棄而走向秀曰不喜自聞死日也列子見之而心醉向秀曰迷惑其道也而歸以告壺丘子列子師也曰始吾以夫子之道為至矣則又有至焉者矣郭象曰謂季咸之至又過於夫子也壺子曰吾與汝無其文未既其實而固得道與與音余衆雌而無雄而又奚卵焉向秀曰夫實由文顯道以事彰有道而無事猶有雌無雄耳今吾與汝雖深淺不同然俱在實位則無文相發矣故未盡我道之實也此言至人之唱必有感而後和者也而以道與世抗抗口浪反或作亢音同必信矣夫故使人得而相悉亮反汝向秀曰元其一方以必信於世故可得而相也嘗試與來以予示之明日列子與之見壺子出而謂列子曰譆譆音熈子之先生死矣弗活矣不可以旬數矣吾見怪焉見濕灰司馬云氣如濕灰焉列子入涕泣沾衾以告壺子壺子曰向吾示之以地文向秀曰塊然若土也罪本作萌乎不誫音震不止罪或作萌向秀曰萌然不動亦不自止與枯木同其不華死灰均其寂魄此至人無感之時也夫至人其動也天其静也地其行也水流其湛也淵嘿淵嘿之與水流天行之與地止其於不為而自然一也今季咸見其尸居而坐忘即謂之將死見其神動而天隨便為之有生茍無心而應感則與變升降以世為量然後足為物主而順時無極耳豈相者之所覺哉是殆見吾杜德㡬也向秀曰德㡬不發故曰杜也嘗又與來明日又與之見壺子出而謂列子曰幸矣子之先生遇我也有瘳矣灰然灰或作全有生矣吾見杜權矣有用而無利故謂之杜權列子入告壺子壺子曰向吾示之以天壤向秀曰天壤之中覆載之功見矣比地之文不猶外乎名實不入向秀曰任自然而覆載則名利之飾皆為棄物而機發於踵許慎注淮南子云機發不旋踵郭象曰常在極上起此為杜權是殆見吾善者幾也向秀曰有善於彼彼乃見之明季咸之所見者淺矣嘗又與來明日又與之見壺子出而謂列子曰子之先生坐不齋齋側皆反下同或無坐字向秀曰無徃不平混然一之以管窺天者莫見其崖故以不齋也吾無得而相焉試齋將且復相之列子入告壺子壺子曰向吾示之以太沖莫眹向秀曰居太沖之極皓然泊心𤣥同萬方莫見其迹是殆見吾衡氣幾也衡平也鯢鯢音倪旋旋音桓云盤桓也一本作旋謂盤旋也之潘音盤本作蟠水之盤回之盤今作潘恐寫之誤為淵止水之潘為淵鯢大魚也桓盤桓也蟠洄流也此言大魚盤桓其水蟠洄而成深泉南華真經作審梁簡文云蟠聚也流水之潘為淵濫咸上聲爾雅云水涌出也水之潘為淵沃沃烏僕反水泉從上溜下也水之潘為淵氿音軌水泉從旁出也水之潘為淵雍音擁河水決出還復入也水之潘為淵汧音牽水之流行也水之潘為淵肥水所出異為肥也水之潘為淵是為九淵焉此九水名義見爾雅夫水一也而隨髙下夷險冇洄激流止之異似至人之心因外物難易有動寂進退之容向秀曰夫水流之與止鯢旋之與龍躍常淵然自若未始失其静黙也郭象曰夫至人用之則行舍之則止雖波流九變治亂紛紜若居其極者常澹然自得泊乎無為也嘗又與來明日又與之見壺子立未定自失而走壺子曰追之列子追之而不及反以報壺子曰已滅矣已失矣吾不及也壺子曰向吾示之以未始出吾宗向秀曰雖進退同羣而常深根寧極也吾與之虚而猗於危反移委移至順之貎向秀曰無心以隨變也不知其誰何向秀曰汎然無所係因以為茅音頽靡崔譔云遜伏也因以為波流故逃也茅靡當為頽靡向秀曰變化頽靡世事波流無徃不因則為之非我我雖不為而與羣俯仰夫至人一也然應世變而時動故相者無所用其心自失而走者也然後列子自以為未始學而歸三年不出向秀曰棄人事之近務也為于偽反其妻㸑㸑七玩反向秀曰遺恥辱食食音嗣下同狶虚豈反楚人呼猪作狶如食人向秀曰忘貴賤也於事無親向秀曰無適無莫也雕瑑持兖反一本作琢復朴塊然獨以其形立向秀曰雕瑑之文復其真朴則外事去矣㤋音紛然而封戎向秀曰真不散也戎或作哉壹以是終向秀曰遂得道也子列子之齊中道而反驚人之推敬於已故不敢遂進遇伯昏暓人伯昏暓人曰奚方而反曰吾驚焉惡音烏乎驚吾食於十漿客賣漿之家而五漿先饋饋求位反餉也人皆敬下之也伯昏暓人曰若是則汝何為驚已曰夫内誠不解郭象曰外自矜飾内不釋然也形諜音牒成光郭象曰舉動便辟成光儀以外鎮人心外以矜嚴服物内實不足使人輕乎貴老使人輕而尊長之者由其形諜成光故也而子西反其所患郭象曰以美形動物則所患亂至矣夫漿人特為食食音嗣羮之貨無多餘之贏贏音盈一本無無字所貨者羮食所利者盈餘而已其為利也薄其為權也輕而猶若是郭象曰權輕利薄可無求於人而皆敬已是髙下大小無所失者而況萬乘之主身勞於國而智盡於事所以不敢之齊彼將任我以事而效我以功吾是以驚推此𩔖也則貨輕者望利薄任重者責功多伯昏暓人曰善哉觀乎汝知驚此者是善觀察者也汝處已人將保汝矣汝若黙然不自顯曜適齊之與處此皆無所懼茍違此義所在見保矣無幾何而徃則户外之屨屨九遇反關西呼履謂之屨滿矣歸之果衆伯昏暓人北面而立敦敦音頓竪也杖蹙之乎頥立有間不言而出賔本作儐導也必忍反者以告列子列子提履徒跣而走暨乎門問曰先生既來曾不廢藥乎廢置也曾無善言以當藥石也曰已矣吾固告汝曰人將保汝果保汝矣非汝能使人保汝順乎理以接物則物不保之今背理而感物求物不保不可得而汝不能使人無汝保也郭象曰任乎而化則無感無求無感無求乃不相保而焉用之感也汝用何術乃感物如此乎感豫出異郭象曰先物施惠惠不因彼豫出而異者且必有感也揺而本身又無謂也必恒使物感已則彼我之性動易之與汝遊者莫汝告也皆揺本之徒不皆相啟悟也彼所小言盡人毒也小言細巧易於感人故為人毒害也莫覺莫悟何相孰也不能相成濟也楊朱南之沛老耼西遊於秦邀於郊至梁而遇老子莊子云楊子居子居或楊朱之字又不與老子同時此皆寓言也老子中道仰天而歎曰始以汝為可教今不可教也與至人遊而未能去其矜夸故曰不可教者也楊朱不答至進涫涫音管莊子作盥漱漱音瘦巾櫛壯乙反脱履本作屨户外行而前曰向者夫子仰天而歎曰始以汝為可教今不可教弟子欲請夫子辭行不間音閑下同是以不敢今夫子間矣請問其過老子曰而睢睢許唯反而盱盱音吁説文云盱仰目也蒼頡篇云盱張目貎髙誘注淮南子云睢盱視聽貎而誰與居汝云何自居處而夸張若此使物故歎之乎大白若辱盛德若不足不與物競則常處卑而守約也楊朱蹵然變容曰敬聞命矣其徃也者迎將家客舍家也公執席妻執巾櫛者避席煬音楊司馬云對火曰煬淮南子云冨人水纂錦貧人煬竈口者避竈厚自藏異則物憚之也其反也者與之争席矣自同於物物所不惡也楊朱過音戈宋東之於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤楊子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也楊子曰弟子記之行賢而去自賢之行安徃而不愛哉夫驕盈矜伐鬼神人道之所不與虚已以循理天下之所樂推以此而徃孰能距之天下有常勝之道有不常勝之道常勝之道曰柔常不勝之道曰彊二者亦知亦當作易而人未之知故上古之言彊先不已若者所勝在已下者耳柔先出於已者不與物競則物不能加也先不已若者至於若已則殆矣遇敵必危之也先出於已者亡亡音無所殆矣理常安也以此勝一身若徒以此任天下若徒謂不勝而自勝不任而自任也夫體柔虚之道處不競之地雖一身之貴天下之大無心而御之同於徒矣徒空黙之謂也郭象曰聽耳之所聞視目之所見知止其所不知能止其所不能用其自用為其自為順徃而不競於物者此至柔之道也故舉其自舉持其自持既無分銖之重而我無力焉粥余六反子曰欲剛必以柔守之欲彊必以弱保之守柔不以求剛而自剛保弱不以求彊而自彊故剛彊者非欲之所能致也積於柔必剛積於弱必彊觀其所積以知禍福之鄉禍福生於所積也彊勝不若已至於若已者剛必有折也柔勝出於已者其力不可量老耼曰兵彊則滅王弼曰物之所惡故必不得終焉木彊則折彊極則毁矣柔弱者生之徒堅彊者死之徒狀不必童童當作同而智童智不必童而狀童聖人取童智而遺童狀衆人近童狀而䟽童智狀與我童者近而愛之狀與我異者䟽而畏之有七尺之骸手足之異戴髪含齒倚而者謂之人而人未必無獸心雖有獸心以狀而見親矣傅音附翼戴角分牙布爪仰飛伏走謂之禽獸而禽獸未必無人心雖有人心以狀而見䟽矣庖犧氏女媧媧音𤓰庖犧女媧皆古天子氏神農氏夏后氏蛇身人面牛首虎鼻此有非人之狀而有大聖之德人形貌自有偶與禽獸相似者古之聖人多有竒表所謂蛇身人面非被鱗臆行無有四支牛首虎鼻非戴角垂胡曼頞解頷亦如相書龜背鵠步鳶肩鷹喙耳夏桀殷紂魯桓楚穆狀貎七竅皆同於人而有禽獸之心而衆人守一狀以求至智未可㡬音兾也黃帝與炎帝戰於阪蒲板反泉之野帥音率熊羆狼豹貙虎為前驅鵰鶡鶡一本作鶚鷹鳶為旗幟幟音熾自熊羆皆猛獸勇鬪者也此以力使禽獸者也堯使䕫典樂擊石拊石百獸率舞簫韶九成鳯皇來儀此以聲致禽獸者也然則禽獸之心奚為異人形音與人異而不知接之之道焉聖人無所不知無所不通故得引而使之焉禽獸之智有自然與人童者其齊欲攝生亦不暇智於人也牝牡相偶母子相親避平依險違寒就温居則有群行户剛反則有列小者居内壯者居外飲則相擕食則鳴羣太古之時則與人同處與人並行德純者禽獸不忌也帝王之時始驚駭散亂矣逮於末世𨼆伏逃竄以避患害人有害物之心物亦知避之也今東方介氏之國其國人數數音朔解六畜朽又反之語者蓋偏知之所得夫龜龍甲鱗之宗麟鳯毛羽之長爰逮蜎飛蠕動皆嗚呼相聞各有意共相制御豈異於人但人不能解因謂禽獸之聲無有音章是以窮理備智則所通萬途因事偏逹偶識一條春秋左氏傳曰介葛盧聞牛鳴曰是生三子盡為犧矣太古神聖之人備知萬物情態悉解異𩔖音聲會而聚之訓而受之同於人民故先會鬼神魑魅禹朝羣神於會稽是也次達八方人民末聚禽獸蟲蛾爾雅云有足曰虫無足曰蛾一本作虫蟻百獸率舞是也言血氣之𩔖心智不殊逺也神聖知其如此故其所教訓者無所遺逸焉宋有狙公者好養猿猴者因謂之狙公也愛狙養之成羣能解狙之意狙亦得公之心損其家口充狙之欲俄而匱焉將限其食恐衆狙之不馴於己也馴音脣先誑之曰與若芧音序芧栗也朝三暮四足乎衆狙皆起而怒俄而曰與若芧朝四而暮三足乎衆狙皆伏而喜物之以能鄙相籠皆猶此也聖人以智籠羣愚亦猶狙公之以智籠衆狙也名實不虧使其喜怒哉紀渻姓紀名渻或作消子為于偽反周宣王養鬪雞十日而問雞可鬪已乎曰未也方虚驕而恃氣無實而自矜者十日又問曰未也猶應影嚮李頸云應響鳴顧影行接悟之速十日又問曰未也猶疾視而盛氣常求敵而必已之勝十日又問曰㡬矣雞雖有鳴者已無變矣彼命敵而我不應忘勝負矣望之似木雞矣其德全矣至全者更不似血氣之𩔖異雞無敢應者反走耳德全者非但已無心乃使外物不生心郭象曰養之以至於全者猶無敵於外況自全乎惠盎阿浪反惠盎惠施之族見賢遍反宋康王康王蹀足謦欬疾言曰寡人之所説者勇有力也不説為仁義者也客將何以教寡人惠盎對曰臣有道於此使人雖勇刺七亦反之不入雖有力擊之弗中丁仲反下同大王獨無意邪宋王曰善此寡人之所欲聞也惠盎曰夫刺之不入擊之不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力弗敢擊夫弗敢非無其志也臣有道於此使人本無其志也夫無其志也未有愛利之心也臣有道於此使天下丈夫女子莫不驩然皆欲愛利之此其賢於勇有力也四累之上也大王獨無意邪處卿大夫士民之上故言四累也宋王曰此寡人之所欲得也惠盎對曰孔墨是已孔丘墨翟無地而為君無官而為長天下丈夫女子莫不延頸舉踵而願安利之今大王萬乗之主也誠有其志則四竟之内皆得其利矣其賢於孔墨也逺矣宋王無以應惠盎趨而出宋王謂左右曰辯矣客之以説服寡人也列子卷二
